# Quality Zero Platform Workflow Update Branch Protection Rulesets And Contract Tests

## Action

Follow the update-branch-protection-rulesets-and-contract-tests workflow:
1. Edit one or more profile YAML files to change required contexts or enforcement modes.
2. Regenerate the corresponding ruleset JSON files in generated/rulesets/ to match the new profile definitions.
3. Update or add control-plane contract tests in tests/ to assert the new enforcement or context requirements.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: profiles/repos/*.yml, profiles/stacks/*.yml, generated/rulesets/*.json

