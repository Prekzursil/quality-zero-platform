# Quality Zero Platform Workflow Implementation Plan And Execution Workflow

## Action

Follow the implementation-plan-and-execution-workflow workflow:
1. Write an initial implementation plan in docs/plans/ (e.g., -tg2-token-preflight-plan.md)
2. Revise the plan after review (e.g., fold in must-fixes)
3. Implement the feature: add code (scripts/quality/...), update workflows (.github/workflows/...), update configuration (pyproject.toml), and write tests (tests/...)

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: docs/plans/2026-06-01-truthful-gate-tg2-token-preflight-plan.md, scripts/quality/truth/preflight.py, scripts/quality/alerts.py

