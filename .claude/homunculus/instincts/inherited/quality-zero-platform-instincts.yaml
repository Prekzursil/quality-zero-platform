# Quality Zero Platform Workflow Design Doc Review Gate Workflow

## Action

Follow the design-doc-review-gate-workflow workflow:
1. Create or update a detailed design document in docs/plans/
2. Update the active plan pointer in .beads/plans/active-plan.md
3. Iterate with addenda to the design doc as review rounds progress (Addendum A, B, C, D, etc.)
4. Lock in decisions and record closure of blockers
5. Mark design-review-gate as passed in the documentation

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: docs/plans/2026-06-01-truthful-gate-subsystem-design.md, .beads/plans/active-plan.md

