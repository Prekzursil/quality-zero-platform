# Quality Zero Platform Workflow Merge Main Into Feature Branch

## Action

Follow the merge-main-into-feature-branch workflow:
1. Checkout the feature branch.
2. Merge main into the feature branch.
3. Resolve any conflicts.
4. Update affected scripts and tests as needed.
5. Commit the merge.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: scripts/quality/*.py, tests/*.py, .github/workflows/*.yml

