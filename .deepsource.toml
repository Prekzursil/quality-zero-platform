version = 1

# Force DeepSource to re-read scope. The ``tests/`` and ``scripts/``
# trees are owned by the platform's own gates (check_deepsource_zero etc.)
# and analyzed by tools other than DeepSource. Keep both leading-slash
# and ``**`` glob variants so DeepSource's matcher catches recursive
# subdirectories regardless of its glob anchor behaviour.

exclude_patterns = [
  "build/**",
  "**/build/**",
  "generated/**",
  "**/generated/**",
  "htmlcov/**",
  "**/htmlcov/**",
  "docs/**",
  "**/docs/**",
  "profiles/**",
  "**/profiles/**",
  "scripts/**",
  "**/scripts/**",
  "tests/**",
  "**/tests/**",
  "scripts/**/*.test.mjs",
  "**/*.test.mjs",
  "templates/**",
  "**/templates/**",
  ".github/**",
  ".vscode/**",
  ".idea/**",
  "vendor/**",
  "node_modules/**",
  "__pycache__/**",
  "**/__pycache__/**",
  "*.lock",
  "*.json",
  "*.md",
]

test_patterns = [
  "tests/**",
  "**/tests/**",
  "scripts/**/*.test.mjs",
  "**/*.test.mjs",
]

[[analyzers]]
name = "python"
enabled = true

  [analyzers.meta]
  runtime_version = "3.x.x"
  max_line_length = 180
  skip_doc_coverage = ["module", "magic", "init", "class", "nonpublic"]

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  environment = ["nodejs", "browser"]
  module_system = "es-modules"
  skip_doc_coverage = [
    "arrow-function-expression",
    "class-declaration",
    "class-expression",
    "function-declaration",
    "function-expression",
    "method-definition",
  ]
