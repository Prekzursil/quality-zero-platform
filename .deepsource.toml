version = 1

# Keep this file explicit so provider-side analysis re-reads repo scope changes.

exclude_patterns = [
  "build/**",
  "generated/**",
  "htmlcov/**",
  "docs/**",
  "profiles/**",
  "scripts/**",
  "tests/**",
  "scripts/**/*.test.mjs",
  ".claude/**",
  ".beads/**",
  "audit/**",
  "known-issues/**",
]

test_patterns = [
  "tests/**",
  "scripts/**/*.test.mjs",
]

[[analyzers]]
name = "python"
enabled = false

[[analyzers]]
name = "javascript"
enabled = false
