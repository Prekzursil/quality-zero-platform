version: 2
updates:
- package-ecosystem: pip
  directory: /
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
  groups:
    pip-root-patch-minor:
      patterns:
      - '*'
      update-types:
      - patch
      - minor
  ignore:
  - dependency-name: '*'
    update-types:
    - version-update:semver-major
  labels:
  - dependencies
  - type:chore
  - area:ci
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
  groups:
    github-actions-root-patch-minor:
      patterns:
      - '*'
      update-types:
      - patch
      - minor
  ignore:
  - dependency-name: '*'
    update-types:
    - version-update:semver-major
  labels:
  - dependencies
  - type:chore
  - area:ci
