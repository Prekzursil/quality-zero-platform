name: Codecov Analytics

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  shared-codecov-analytics:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/reusable-codecov-analytics.yml
    with:
      repo_slug: Prekzursil/quality-zero-platform
      event_name: ${{ github.event_name }}
      sha: ${{ github.event.pull_request.head.sha || github.sha }}
      platform_repository: ${{ github.repository }}
      platform_ref: ${{ github.event.pull_request.head.sha || github.sha }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
