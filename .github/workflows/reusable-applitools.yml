name: Reusable Applitools Visual Regression

permissions: {}

on:
  workflow_call:
    inputs:
      repo_slug:
        type: string
        required: true
      eyes_config_path:
        type: string
        required: false
        default: "applitools.config.js"
      batch_name:
        type: string
        required: false
        default: ""
      working_directory:
        type: string
        required: false
        default: "."
      platform_repository:
        type: string
        required: false
        default: Prekzursil/quality-zero-platform
      platform_ref:
        type: string
        required: false
        default: main
    secrets:
      APPLITOOLS_API_KEY:
        required: true

jobs:
  applitools:
    name: Applitools Visual
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.platform_repository }}
          ref: ${{ inputs.platform_ref }}
          path: platform
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install platform dependencies
        run: python -m pip install -r platform/requirements-dev.txt

      - name: Validate eyes_config_path (§B.2.2)
        # Semgrep ``run-shell-injection``: route ``github.*`` and ``inputs.*``
        # values through ``env:`` instead of interpolating them into the
        # ``run:`` script directly. Keeps a malicious workflow input
        # (``eyes_config_path``) from breaking out of the argument slot into
        # arbitrary shell.
        env:
          REPO_ROOT: ${{ github.workspace }}
          EYES_CONFIG_PATH: ${{ inputs.eyes_config_path }}
        run: |
          python platform/scripts/quality/rollup_v2/validate_workflow_paths.py \
            --repo-root "$REPO_ROOT" \
            --path "$EYES_CONFIG_PATH"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ${{ inputs.working_directory }}
        run: npm ci

      - name: Run Applitools Eyes
        # Route ``inputs.eyes_config_path`` through env for the same reason
        # as the validation step above (Semgrep ``run-shell-injection``).
        working-directory: ${{ inputs.working_directory }}
        env:
          APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY }}
          APPLITOOLS_BATCH_NAME: ${{ inputs.batch_name != '' && inputs.batch_name || format('PR {0}', github.event.pull_request.number) }}
          EYES_CONFIG_PATH: ${{ inputs.eyes_config_path }}
        run: |
          npx @applitools/eyes-storybook --conf "$EYES_CONFIG_PATH" \
            --exitcode || true

      - name: Upload Applitools artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: applitools-artifacts
          path: |
            ${{ inputs.working_directory }}/applitools-results.json
