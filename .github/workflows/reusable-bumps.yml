name: Reusable Bumps

# QZP v2 Phase 5 §5.5 — fleet-wide bump recipe rollout.
# ``workflow_dispatch`` entry point that loads a recipe from
# ``profiles/bumps/<date>-<name>.yml``, validates it against the
# bump-recipe schema, plans the staging + rollout waves, and
# (in a future increment) opens the per-repo PRs. Today this
# workflow ships the PLAN step so the recipe schema is reachable
# from CI. The per-repo PR-opening + staging-CI wait + rollback
# land in a follow-up increment.
#
# Waves, per the design doc:
#  1. Stage 1: open PRs against ``staging_repos``. Wait for CI
#     green on all.
#  2. Stage 2 (auto when ``full_rollout_after_staging: true``):
#     open PRs against the rest of the affected fleet.
#  3. Rollback: if stage 1 CI fails on >= 1 repo, revert the
#     bump recipe commit + open ``alert:fleet-bump-fail``.

permissions: {}

# checkov:skip=CKV_GHA_7:fleet-bump orchestrator; inputs are control-plane params (recipe path, fleet inventory, dry-run flag), not build-output mutators
on:
  workflow_dispatch:
    inputs:
      recipe_path:
        type: string
        required: true
        description: "Path to the bump recipe YAML (e.g. ``profiles/bumps/2026-04-23-node-24.yml``)."
      fleet_path:
        type: string
        required: false
        default: inventory/repos.yml
        description: "Path to fleet inventory; used to compute the rollout wave."
      dry_run:
        type: boolean
        required: false
        default: true
        description: "When true, print the plan but do not open PRs or touch alerts."

concurrency:
  group: bumps-${{ inputs.recipe_path }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      staging: ${{ steps.plan.outputs.staging }}
      rollout: ${{ steps.plan.outputs.rollout }}
      recipe_name: ${{ steps.plan.outputs.recipe_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install platform dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Plan rollout waves
        id: plan
        env:
          BUMP_RECIPE_PATH: ${{ inputs.recipe_path }}
          BUMP_FLEET_PATH: ${{ inputs.fleet_path }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          import yaml
          from scripts.quality import bumps, bump_rollout

          recipe_path = Path(os.environ["BUMP_RECIPE_PATH"].strip())
          fleet_path_raw = os.environ.get("BUMP_FLEET_PATH", "").strip()

          recipe = bumps.load_bump_recipe(recipe_path)
          fleet: list = []
          if fleet_path_raw and Path(fleet_path_raw).is_file():
              raw = yaml.safe_load(Path(fleet_path_raw).read_text(encoding="utf-8")) or {}
              fleet = list(raw.get("repos", []))

          plan = bump_rollout.plan_rollout(recipe=recipe, fleet=fleet)

          output_path = os.environ.get("GITHUB_OUTPUT")
          if output_path:
              with open(output_path, "a", encoding="utf-8") as fh:
                  fh.write(f"recipe_name={recipe['name']}\n")
                  fh.write(f"staging={json.dumps(plan['staging'])}\n")
                  fh.write(f"rollout={json.dumps(plan['rollout'])}\n")

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a", encoding="utf-8") as fh:
                  fh.write(f"## Bump Rollout Plan — {recipe['name']}\n\n")
                  fh.write(f"- Recipe: `{recipe_path}`\n")
                  fh.write(f"- Affects stacks: `{', '.join(recipe['affects_stacks'])}`\n")
                  fh.write(f"- Staging ({len(plan['staging'])}): ")
                  fh.write(", ".join(f"`{s}`" for s in plan['staging']) + "\n")
                  fh.write(f"- Rollout ({len(plan['rollout'])}): ")
                  fh.write(", ".join(f"`{s}`" for s in plan['rollout']) + "\n")
                  fh.write("- Per-repo PR opening arrives in a follow-up "
                           "increment (Phase 5 inc-3.6).\n")
          PY

  notify-dry-run:
    needs: plan
    if: ${{ inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Record dry-run
        env:
          BUMP_RECIPE_NAME: ${{ needs.plan.outputs.recipe_name }}
          BUMP_STAGING: ${{ needs.plan.outputs.staging }}
          BUMP_ROLLOUT: ${{ needs.plan.outputs.rollout }}
        run: |
          echo "Dry-run — no PRs opened for $BUMP_RECIPE_NAME."
          echo "Staging: $BUMP_STAGING"
          echo "Rollout: $BUMP_ROLLOUT"

  stage-1:
    # Stage 1 fans out the recipe to every ``staging_repos`` entry via
    # the per-repo applier. Always runs (even when dry_run=true) so
    # operators can verify the bumper sees the right files; the
    # applier's own dry_run gate decides whether to actually open a
    # PR. Stage 2 (rollout to remaining affected fleet) is gated on
    # this stage's matrix completing without any failure.
    needs: plan
    if: ${{ needs.plan.outputs.staging != '[]' && needs.plan.outputs.staging != '' }}
    strategy:
      fail-fast: false
      matrix:
        slug: ${{ fromJson(needs.plan.outputs.staging) }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/reusable-bump-apply.yml
    with:
      repo_slug: ${{ matrix.slug }}
      recipe_path: ${{ inputs.recipe_path }}
      dry_run: ${{ inputs.dry_run }}
    secrets:
      DRIFT_SYNC_PAT: ${{ secrets.DRIFT_SYNC_PAT }}

  stage-2:
    # Stage 2 rolls the recipe out to the remaining affected fleet
    # (every repo whose stack is in ``affects_stacks`` minus the
    # already-staged subset). Gated on stage-1 SUCCESS — if any
    # staging-wave matrix entry failed, this job does NOT run and
    # the rollback job below picks up instead.
    needs: [plan, stage-1]
    # NOTE: ``if:`` value MUST be a plain expression (or a folded scalar
    # that produces a single-line expression). A ``|`` literal block
    # turns the body into a non-empty string which is always truthy, so
    # the condition silently evaluates to true regardless of the actual
    # check (CodeQL ``actions/if-expression-always-true/high``).
    if: needs.plan.outputs.rollout != '[]' && needs.plan.outputs.rollout != '' && needs.stage-1.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        slug: ${{ fromJson(needs.plan.outputs.rollout) }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/reusable-bump-apply.yml
    with:
      repo_slug: ${{ matrix.slug }}
      recipe_path: ${{ inputs.recipe_path }}
      dry_run: ${{ inputs.dry_run }}
    secrets:
      DRIFT_SYNC_PAT: ${{ secrets.DRIFT_SYNC_PAT }}

  rollback:
    # Rollback fires when stage-1 fails (one or more staging repos
    # couldn't apply the bump). Opens an ``alert:fleet-bump-fail``
    # issue on the platform repo with a summary of which staging
    # repos failed. The actual revert of the in-flight PRs is left
    # to the operator (the staging PRs are isolated branches on
    # consumer repos; merging them is gated on consumer-side review
    # so a "rollback" of unmerged-PRs is mostly cosmetic).
    needs: [plan, stage-1]
    if: ${{ needs.stage-1.result == 'failure' && !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install platform dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Open fleet-bump-fail alert
        env:
          BUMP_RECIPE_PATH: ${{ inputs.recipe_path }}
          BUMP_RECIPE_NAME: ${{ needs.plan.outputs.recipe_name }}
          BUMP_STAGING: ${{ needs.plan.outputs.staging }}
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          from scripts.quality import alerts

          recipe_name = os.environ.get("BUMP_RECIPE_NAME", "").strip()
          recipe_path = os.environ.get("BUMP_RECIPE_PATH", "").strip()
          staging_json = os.environ.get("BUMP_STAGING", "[]").strip() or "[]"
          try:
              staging = json.loads(staging_json)
          except json.JSONDecodeError:
              staging = []

          subject = recipe_name or recipe_path or "<unknown-recipe>"
          body = (
              f"Bump recipe **{recipe_name or recipe_path}** failed CI in "
              f"its staging wave. Staging repos targeted by the recipe: "
              f"{', '.join(f'`{s}`' for s in staging) or '_(none)_'}. "
              f"Investigate the failed staging job(s), revert the recipe "
              f"file commit if needed, and re-dispatch ``reusable-bumps.yml`` "
              f"after the underlying issue is fixed."
          )
          alerts.open_alert_issue(
              "Prekzursil/quality-zero-platform",
              alert_type=alerts.AlertType.FLEET_BUMP_FAIL,
              subject=subject,
              body=body,
          )
          PY
