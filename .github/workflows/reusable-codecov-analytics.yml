name: Reusable Codecov Analytics

permissions: {}

on:
  workflow_call:
    inputs:
      repo_slug:
        type: string
        required: true
      event_name:
        type: string
        required: false
        default: pull_request
      sha:
        type: string
        required: false
        default: ""
      platform_repository:
        type: string
        required: false
        default: Prekzursil/quality-zero-platform
      platform_ref:
        type: string
        required: false
        default: main
      runner:
        type: string
        required: false
        default: ubuntu-latest
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  codecov-analytics:
    name: Codecov Analytics
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
          ref: ${{ inputs.sha != '' && inputs.sha || github.sha }}
          persist-credentials: false
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.platform_repository }}
          ref: ${{ inputs.platform_ref }}
          path: platform
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install platform dependencies
        run: python -m pip install -r platform/requirements-dev.txt
      - name: Export resolved profile
        id: profile
        env:
          REPO_SLUG: ${{ inputs.repo_slug }}
          EVENT_NAME_INPUT: ${{ inputs.event_name }}
        run: |
          python platform/scripts/quality/export_profile.py \
            --repo-slug "$REPO_SLUG" \
            --event-name "$EVENT_NAME_INPUT" \
            --out-json "$RUNNER_TEMP/profile.json" \
            --github-output "$GITHUB_OUTPUT"
      - name: Install coverage system packages
        if: steps.profile.outputs.coverage_system_packages_json != '[]'
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          packages = json.loads(os.environ["PACKAGES_JSON"])
          if packages:
              subprocess.run(["sudo", "apt-get", "update"], check=True)
              subprocess.run(["sudo", "apt-get", "install", "-y", *packages], check=True)
          PY
        env:
          PACKAGES_JSON: ${{ steps.profile.outputs.coverage_system_packages_json }}
      - name: Set up Node
        if: steps.profile.outputs.coverage_node_version != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.profile.outputs.coverage_node_version }}
      - name: Set up Go
        if: steps.profile.outputs.coverage_go_version != ''
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.profile.outputs.coverage_go_version }}
      - name: Set up Java
        if: steps.profile.outputs.coverage_java_version != ''
        uses: actions/setup-java@v4
        with:
          distribution: ${{ steps.profile.outputs.coverage_java_distribution }}
          java-version: ${{ steps.profile.outputs.coverage_java_version }}
      - name: Set up .NET
        if: steps.profile.outputs.coverage_dotnet_version != ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ steps.profile.outputs.coverage_dotnet_version }}
      - name: Set up Rust
        if: steps.profile.outputs.coverage_needs_rust == 'true'
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
      - name: Run profile coverage command
        working-directory: repo
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          profile_path = Path(os.environ["RUNNER_TEMP"]) / "profile.json"
          coverage = json.loads(profile_path.read_text(encoding="utf-8")).get("coverage", {})
          command = str(coverage.get("command", "")).strip()
          if not command:
              raise SystemExit("Missing coverage command")
          shell_name = str(coverage.get("shell", "bash")).strip() or "bash"
          if shell_name == "pwsh":
              cmd = ["pwsh", "-NoLogo", "-Command", command]
          else:
              cmd = ["bash", "-lc", command]
          subprocess.run(cmd, check=True)
          PY
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          files: ${{ steps.profile.outputs.coverage_input_files }}
          fail_ci_if_error: true
          use_oidc: ${{ secrets.CODECOV_TOKEN == '' }}
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
