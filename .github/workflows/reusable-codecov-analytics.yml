name: Reusable Codecov Analytics

permissions: {}

on:
  workflow_call:
    inputs:
      repo_slug:
        type: string
        required: true
      event_name:
        type: string
        required: false
        default: pull_request
      sha:
        type: string
        required: false
        default: ""
      platform_repository:
        type: string
        required: false
        default: Prekzursil/quality-zero-platform
      platform_ref:
        type: string
        required: false
        default: main
      runner:
        type: string
        required: false
        default: ubuntu-latest
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  codecov-analytics:
    name: Codecov Analytics
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
          ref: ${{ inputs.sha != '' && inputs.sha || github.sha }}
          persist-credentials: false
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.platform_repository }}
          ref: ${{ inputs.platform_ref }}
          path: platform
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install platform dependencies
        shell: bash
        run: python -m pip install -r platform/requirements-dev.txt
      - name: Export resolved profile
        id: profile
        env:
          REPO_SLUG: ${{ inputs.repo_slug }}
          EVENT_NAME_INPUT: ${{ inputs.event_name }}
        shell: bash
        run: |
          python platform/scripts/quality/export_profile.py \
            --repo-slug "$REPO_SLUG" \
            --event-name "$EVENT_NAME_INPUT" \
            --out-json "$RUNNER_TEMP/profile.json" \
            --github-output "$GITHUB_OUTPUT"
      - name: Install coverage system packages
        if: steps.profile.outputs.coverage_system_packages_json != '[]'
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          packages = json.loads(os.environ["PACKAGES_JSON"])
          if packages:
              subprocess.run(["sudo", "apt-get", "update"], check=True)
              subprocess.run(["sudo", "apt-get", "install", "-y", *packages], check=True)
          PY
        env:
          PACKAGES_JSON: ${{ steps.profile.outputs.coverage_system_packages_json }}
      - name: Set up Node
        if: steps.profile.outputs.coverage_node_version != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.profile.outputs.coverage_node_version }}
      - name: Set up Go
        if: steps.profile.outputs.coverage_go_version != ''
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.profile.outputs.coverage_go_version }}
      - name: Set up Java
        if: steps.profile.outputs.coverage_java_version != ''
        uses: actions/setup-java@v4
        with:
          distribution: ${{ steps.profile.outputs.coverage_java_distribution }}
          java-version: ${{ steps.profile.outputs.coverage_java_version }}
      - name: Set up .NET
        if: steps.profile.outputs.coverage_dotnet_version != ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ steps.profile.outputs.coverage_dotnet_version }}
      - name: Set up Rust
        if: steps.profile.outputs.coverage_needs_rust == 'true'
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
      - name: Run profile coverage command
        working-directory: repo
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          profile_path = Path(os.environ["RUNNER_TEMP"]) / "profile.json"
          coverage = json.loads(profile_path.read_text(encoding="utf-8")).get("coverage", {})
          command = str(coverage.get("command", "")).strip()
          if not command:
              raise SystemExit("Missing coverage command")
          shell_name = str(coverage.get("shell", "bash")).strip() or "bash"
          if shell_name == "pwsh":
              cmd = ["pwsh", "-NoLogo", "-Command", command]
          else:
              cmd = ["bash", "-lc", command]
          subprocess.run(cmd, check=True)
          PY
      - name: Upload coverage to Codecov (per-flag split)
        # QZP v2 Phase 2: loop once per ``coverage.inputs[]`` entry so
        # Codecov records each file under its own flag instead of
        # merging them into a single Python-only blob. See docs/QZP-V2-
        # DESIGN.md §5.1 for the event-link case that surfaced this.
        #
        # ``codecov-action`` accepts a single ``flags`` value per call,
        # so we iterate the structured ``coverage_inputs_json`` output
        # and re-enter the action for each row. The old single-upload
        # ``files:`` path is replaced; ``coverage_input_files`` stays in
        # the profile exporter for legacy consumers (qlty, codacy).
        shell: bash
        working-directory: repo
        env:
          COVERAGE_INPUTS_JSON: ${{ steps.profile.outputs.coverage_inputs_json }}
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          PLATFORM_REPOSITORY: ${{ inputs.platform_repository }}
          PLATFORM_REF: ${{ inputs.platform_ref }}
          REPO_SLUG: ${{ inputs.repo_slug }}
          TARGET_SHA: ${{ inputs.sha != '' && inputs.sha || github.sha }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import shutil
          import subprocess
          import sys
          import urllib.request
          from pathlib import Path

          inputs = json.loads(os.environ.get("COVERAGE_INPUTS_JSON", "[]") or "[]")
          if not isinstance(inputs, list) or not inputs:
              print("No coverage inputs declared; skipping Codecov upload.", flush=True)
              sys.exit(0)

          # Pin the codecov uploader by pulling the same CLI the action
          # would have used. `curl https://cli.codecov.io/...` returns a
          # single static binary; no npm/yarn dependency footprint.
          bin_dir = Path(os.environ["RUNNER_TEMP"]) / "codecov-cli"
          bin_dir.mkdir(parents=True, exist_ok=True)
          target = bin_dir / "codecov"
          if not target.exists():
              url = "https://cli.codecov.io/latest/linux/codecov"
              with urllib.request.urlopen(url) as response:  # noqa: S310
                  target.write_bytes(response.read())
              target.chmod(0o755)

          token = os.environ.get("CODECOV_TOKEN", "").strip()
          sha = os.environ["TARGET_SHA"]
          repo_slug = os.environ["REPO_SLUG"]

          def run_cli(flag: str, path: str) -> None:
              """Invoke codecov CLI for one (path, flag) pair."""
              cmd = [
                  str(target),
                  "--verbose",
                  "upload-process",
                  "--fail-on-error",
                  "--sha", sha,
                  "--slug", repo_slug,
                  "--file", path,
                  "--flag", flag,
                  "--disable-search",
              ]
              if token:
                  cmd.extend(["--token", token])
              print(f"[codecov] upload flag={flag} path={path}", flush=True)
              subprocess.run(cmd, check=True)

          missing = [row for row in inputs if not Path(row["path"]).is_file()]
          if missing:
              print(
                  f"[codecov] missing coverage files on disk: {[row['path'] for row in missing]}",
                  flush=True,
              )
              sys.exit(2)

          for row in inputs:
              run_cli(row["flag"], row["path"])

          print(f"[codecov] uploaded {len(inputs)} flag(s) for {sha}", flush=True)
          PY
      - name: Validate Codecov flags
        # Post-upload guard: poll Codecov's API and fail CI if any declared
        # flag is missing from the commit report. Catches the silent-drop
        # path where the upload "succeeded" (exit 0) but Codecov never
        # wrote anything for a particular flag — the same class of failure
        # that made event-link ship at 58% with three inputs declared.
        #
        # All GitHub-context values come in via env: (not interpolated into
        # the run: script) to avoid the script-injection class Semgrep
        # flags. ``profile.json`` carries the declared ``coverage.inputs``
        # that the validator cross-checks against Codecov's API report.
        if: always()
        shell: bash
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          VALIDATE_REPO_SLUG: ${{ inputs.repo_slug }}
          VALIDATE_SHA: ${{ inputs.sha != '' && inputs.sha || github.sha }}
        run: |
          python platform/scripts/quality/validate_codecov_flags.py \
            --repo-slug "$VALIDATE_REPO_SLUG" \
            --sha "$VALIDATE_SHA" \
            --inputs-json "$RUNNER_TEMP/profile.json"
