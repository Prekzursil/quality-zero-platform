name: Reusable Quality Zero Gate

permissions: {}

on:
  workflow_call:
    inputs:
      repo_slug:
        type: string
        required: true
      event_name:
        type: string
        required: false
        default: pull_request
      sha:
        type: string
        required: false
        default: ""
      platform_repository:
        type: string
        required: false
        default: Prekzursil/quality-zero-platform
      platform_ref:
        type: string
        required: false
        default: main

jobs:
  quality-zero-gate:
    permissions:
      contents: read
    name: Quality Zero Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.platform_repository }}
          ref: ${{ inputs.platform_ref }}
          path: platform
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install platform dependencies
        run: python -m pip install -r platform/requirements-dev.txt
      - name: Export resolved profile
        env:
          REPO_SLUG: ${{ inputs.repo_slug }}
          EVENT_NAME_INPUT: ${{ inputs.event_name }}
        run: |
          python platform/scripts/quality/export_profile.py \
            --repo-slug "$REPO_SLUG" \
            --event-name "$EVENT_NAME_INPUT" \
            --out-json "$RUNNER_TEMP/profile.json"
      - name: Assert required quality contexts are green
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ inputs.sha }}
          EVENT_NAME: ${{ inputs.event_name }}
        run: |
          python platform/scripts/quality/run_quality_zero_gate.py \
            --profile-json "$RUNNER_TEMP/profile.json" \
            --repo-dir "." \
            --platform-dir platform \
            --out-json "quality-zero-gate/required-checks.json" \
            --out-md "quality-zero-gate/required-checks.md"
      - name: Upload aggregate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-zero-gate
          path: quality-zero-gate
