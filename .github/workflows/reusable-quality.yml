# Lean 6-gate quality template (workflow_call reusable workflow).
#
# This is the ADDITIVE thin template adopted by the lean-gate charter
# (decided 2026-06-16). It is the multi-language generalization of the PROVEN
# lean gate running in Prekzursil/Reframe (.github/workflows/quality.yml) — same
# tool pins, same single-job binary green/red model.
#
# It does NOT replace the existing fleet reusable workflows; the 13 enrolled
# repos still call those. The ~80% deletion of the old SaaS machinery is
# deferred to the migration runbook until the fleet moves off it.
#
# ── Adoption (≈5 lines in the caller repo) ──────────────────────────────────
#   # .github/workflows/quality.yml in the CALLER repo
#   name: quality
#   on:
#     push: { branches: [main] }
#     pull_request: { branches: [main] }
#   permissions: { contents: read }
#   jobs:
#     quality:
#       uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-quality.yml@main
#
# ── The closed 6-gate charter this workflow enforces ────────────────────────
#   1. Lint+format (SELF-CONTAINED — the workflow's OWN pinned CLIs, NOT the
#      caller's pre-commit): Ruff[py] · Oxlint+Biome[ts/js]
#   2. Types:        tsc --noEmit[ts] · basedpyright (standard mode)[py]
#   3. Tests+cov:    STRICT 100% line+branch (standing policy; ratchet retired)
#   4. SAST:         Opengrep (Semgrep CE acceptable), pinned in-repo ruleset
#   5. Secrets:      gitleaks (pinned + allowlist) — SELF-CONTAINED (always)
#   6. Deps:         osv-scanner + Dependabot (no Renovate)
#
# round-6 FIX (self-contained gate 1+5): gate-1 lint/format and gate-5 secrets
# NO LONGER run the caller's `.pre-commit-config.yaml` via `pre-commit run
# --all-files`. That depended on each repo's BESPOKE hooks + environment (a root
# npm lockfile for npm ci, the .NET SDK for dotnet-format, caller-local
# eslint/tsc/prettier, ...), so it red-failed for CALLER-ENVIRONMENT reasons even
# when the repo's REAL lean quality was fine. Instead the workflow now runs the
# lean charter's OWN tools directly: ruff check + ruff format --check for Python
# (honoring a caller [tool.ruff] / ruff.toml when present), and gitleaks for
# secrets (honoring a caller .gitleaks.toml allowlist). oxlint + biome for ts/js
# were ALREADY self-contained (gate-lint-format-jsts) and are unchanged. This is
# NOT weakening: the SAME lean charter tools still gate (ruff issues + gitleaks
# findings still FAIL) — they just no longer drag in the caller's pre-commit env.
#
# Auto-detection: the single `quality` job inspects the CALLER's checked-out
# tree and runs ONLY the lanes whose language is present. A repo with no Python
# skips the Python lanes, a repo with no JS/TS skips tsc, etc. The lint lanes run
# whenever their language is present; gitleaks/opengrep/osv run when their config
# is present (gitleaks runs whenever a .gitleaks.toml allowlist is shipped).
#
# No silent-pass: the coverage lane (gate 3) NEVER passes a language green
# without measuring it. If a language has source AND test files but no coverage
# config/script, the lane FAILS (the 100% gate cannot pass unmeasured). The ONLY
# coverage skip is the narrow, documented "no test surface by design" case —
# source present with ZERO test files (e.g. a pure type-stub or generated-only
# package). Robustness: the pip cache is enabled only when a Python manifest is
# resolvable; osv-scanner treats "no manifests/lockfiles" as PASS (not exit-128);
# tsc runs per-tsconfig so nested/monorepo projects are checked, not hard-failed.
# Gate 3 installs the CALLER's Python runtime deps (requirements*/pyproject/
# setup.*) before pytest so tests importing a runtime dep don't ModuleNotFoundError,
# and runs `npm ci` before any node coverage. Gate 1's lint/format runs the
# workflow's OWN pinned CLIs SELF-CONTAINED (ruff[py], oxlint+biome[ts/js]), so a
# caller-local frontend-eslint / dotnet-format / etc. pre-commit hook cannot abort
# the lean gate — the caller's `.pre-commit-config.yaml` is no longer executed.
#
# round-5 FIX A (basedpyright standard): basedpyright's DEFAULT mode is stricter
# than pyright (reportAny/reportUnknown*/reportUnusedCallResult), flooding untyped
# utility scripts with thousands of non-bug errors (momentstudio 2774, swfoc 39,
# pbinfo 11). Reframe runs it at typeCheckingMode = "standard". So gate-2 now
# HONORS a caller basedpyright/pyright config (pyrightconfig.json /
# basedpyrightconfig.json / pyproject [tool.(based)pyright]) when present, else
# passes `--typecheckingmode standard`. Real type errors at standard still FAIL.
#
# round-5 FIX B (per-language toolchain setup) — RETIRED in round-6: those setups
# (setup-go / setup-dotnet / setup-java / rust-toolchain) existed ONLY so the
# caller pre-commit's per-language autofixers (golangci-lint / dotnet-format /
# spotless / clippy+rustfmt) had a toolchain. round-6 stopped running the caller
# pre-commit, and NO remaining gate step invokes go/.NET/java/rust, so those four
# toolchain setups were dropped as dead weight. Only Python and Node are set up —
# they back gate-2 (basedpyright / tsc), gate-3 (coverage) and the self-contained
# gate-1 lint/format (ruff / oxlint+biome). Each runs ONLY when its language is
# detected; all actions are SHA-pinned.

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python toolchain version for the Python lanes."
        type: string
        required: false
        default: "3.12"
      node-version:
        description: "Node toolchain version for the JS/TS lanes."
        type: string
        required: false
        default: "20"
      opengrep-paths:
        description: "Space-separated paths the SAST gate scans (default: repo root '.')."
        type: string
        required: false
        default: "."

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      # ── Language detection ────────────────────────────────────────────────
      # Sets boolean outputs consumed by the per-lane `if:` guards below.
      - name: Detect languages present in caller
        id: detect
        shell: bash
        run: |
          set -eu
          # SIGPIPE-SAFE detection (round-3 FIX 2): the detection helpers pipe
          # `git ls-files ... | head -1`; `head` closes the pipe after the first
          # line, so `git` (the writer) is killed with SIGPIPE and exits 141. Under
          # `set -o pipefail` that 141 becomes the pipeline's exit and aborts the
          # whole step (observed: event-link). Detection must NEVER hard-fail — it
          # only sets boolean outputs — so pipefail is DISABLED for this step. Each
          # helper already tolerates an empty result (treated as "absent"), and the
          # `2>/dev/null` keeps stderr quiet. We do NOT set pipefail here; a head-
          # closed-early SIGPIPE can therefore never red the gate before any lane runs.
          set +o pipefail
          has() { [ -n "$(git ls-files "$@" 2>/dev/null | head -1)" ] && echo true || echo false; }
          any() { [ -n "${1:-}" ] && echo true || echo false; }
          file_exists() { [ -f "$1" ] && echo true || echo false; }
          # A resolvable Python dependency manifest (used to gate the pip cache so
          # setup-python never hard-fails when there is nothing to cache).
          py_manifest="$(git ls-files \
            requirements.txt requirements*.txt '**/requirements.txt' '**/requirements*.txt' \
            pyproject.toml '**/pyproject.toml' setup.py '**/setup.py' \
            setup.cfg '**/setup.cfg' Pipfile '**/Pipfile' 2>/dev/null | head -1)"
          # ALL resolvable Python manifests, one per line — used verbatim as
          # setup-python's `cache-dependency-path` (round-3 FIX 3). actions/setup-
          # python's `cache: pip` default hash glob is ONLY `**/requirements.txt`
          # OR `**/pyproject.toml`; a repo whose only manifest is non-standard
          # (e.g. requirements-dev.txt / requirements/*.txt) matches NEITHER, so
          # setup-python hard-fails "No file matched to [**/requirements.txt or
          # **/pyproject.toml]" BEFORE any gate runs (observed: codeblocks). We
          # therefore feed it the ACTUAL detected manifest paths so the cache key
          # always has a real file to hash.
          py_manifest_paths="$(git ls-files \
            requirements.txt requirements*.txt '**/requirements.txt' '**/requirements*.txt' \
            'requirements/*.txt' '**/requirements/*.txt' \
            pyproject.toml '**/pyproject.toml' setup.py '**/setup.py' \
            setup.cfg '**/setup.cfg' Pipfile '**/Pipfile' 2>/dev/null | sort -u)"
          # Any dependency manifest OR lockfile osv-scanner can actually scan. With
          # NONE of these, `osv-scanner scan source` exits 128 ("no package sources").
          osv_sources="$(git ls-files \
            '**/requirements*.txt' requirements*.txt \
            '**/package-lock.json' package-lock.json '**/yarn.lock' yarn.lock \
            '**/pnpm-lock.yaml' pnpm-lock.yaml '**/Cargo.lock' Cargo.lock \
            '**/go.mod' go.mod '**/go.sum' go.sum '**/Gemfile.lock' Gemfile.lock \
            '**/poetry.lock' poetry.lock '**/Pipfile.lock' Pipfile.lock \
            '**/pyproject.toml' pyproject.toml '**/composer.lock' composer.lock \
            '**/pom.xml' pom.xml '**/gradle.lockfile' gradle.lockfile 2>/dev/null | head -1)"
          # A Python coverage configuration (pytest/coverage settings live here).
          py_cov_cfg="$(git ls-files pyproject.toml setup.cfg tox.ini '.coveragerc' 'pytest.ini' 2>/dev/null | head -1)"
          # round-5 FIX A — a basedpyright / pyright config supplied BY THE CALLER.
          # When present we honor it verbatim (run basedpyright as-is); when ABSENT
          # we pass `--typecheckingmode standard` so the type gate uses the proven
          # standard bar (mirroring Reframe's [tool.basedpyright] typeCheckingMode =
          # "standard") instead of basedpyright's STRICTER default, which floods
          # untyped utility scripts with reportAny/reportUnknown*/reportUnusedCallResult
          # (observed: momentstudio 2774, swfoc 39, pbinfo 11 — all from scripts/utils,
          # none real bugs). A pyproject.toml counts only if it actually carries a
          # `[tool.basedpyright]` or `[tool.pyright]` table.
          py_pyright_cfg="$(git ls-files pyrightconfig.json basedpyrightconfig.json 2>/dev/null | head -1)"
          if [ -z "$py_pyright_cfg" ] && [ -f pyproject.toml ] \
            && grep -Eq '^\[tool\.(based)?pyright\]' pyproject.toml 2>/dev/null; then
            py_pyright_cfg=pyproject.toml
          fi
          # round-5 FIX B — per-language toolchain detection (source OR manifest).
          # C#/.NET, Java/Kotlin, Rust and Go each need their toolchain set up
          # BEFORE the gate that runs their linter/formatter, else the lane hard-fails
          # (observed: codex-session — dotnet-format -> "Restore operation failed", no
          # .NET SDK). round-6 RETIRED those toolchains (the caller pre-commit that
          # used them no longer runs), so the go/rust/csharp/javakotlin/dotnet detect
          # outputs were dropped — no surviving gate step consumes them.
          # Test surface — if a language has source but ZERO test files, a missing
          # coverage config is "no test surface by design" (skip), not a hole (fail).
          py_tests="$(git ls-files 'test_*.py' '*_test.py' '**/test_*.py' '**/*_test.py' \
            'tests/**' '**/tests/**' conftest.py '**/conftest.py' 2>/dev/null | head -1)"
          jsts_tests="$(git ls-files \
            '*.test.ts' '*.test.tsx' '*.test.js' '*.test.jsx' '*.test.mjs' '*.test.cjs' \
            '*.spec.ts' '*.spec.tsx' '*.spec.js' '*.spec.jsx' '*.spec.mjs' '*.spec.cjs' \
            '**/*.test.*' '**/*.spec.*' '__tests__/**' '**/__tests__/**' 2>/dev/null | head -1)"
          {
            echo "python=$(has '*.py')"
            echo "ts=$(has '*.ts' '*.tsx')"
            echo "jsts=$(has '*.ts' '*.tsx' '*.js' '*.jsx' '*.mjs' '*.cjs')"
            echo "pyrightcfg=$(any "$py_pyright_cfg")"
            echo "opengrep=$([ -d .quality/opengrep ] && echo true || echo false)"
            echo "gitleaks=$(file_exists .gitleaks.toml)"
            echo "osv=$(file_exists osv-scanner.toml)"
            echo "charter=$([ -f .quality/charter.yml ] && echo true || echo false)"
            echo "pymanifest=$(any "$py_manifest")"
            echo "osvsources=$(any "$osv_sources")"
            echo "pycovcfg=$(any "$py_cov_cfg")"
            echo "pytests=$(any "$py_tests")"
            echo "jststests=$(any "$jsts_tests")"
          } >> "$GITHUB_OUTPUT"
          # Multiline output (round-3 FIX 3): the newline-separated manifest paths
          # for setup-python's cache-dependency-path. Heredoc delimiter form is
          # required for multiline GITHUB_OUTPUT values.
          {
            echo "pymanifestpaths<<__QZT_EOF__"
            printf '%s\n' "$py_manifest_paths"
            echo "__QZT_EOF__"
          } >> "$GITHUB_OUTPUT"
          echo "Detected:"; cat "$GITHUB_OUTPUT"

      # ── Toolchains (set up only what the caller needs) ────────────────────
      # Two variants so the pip cache is enabled ONLY when a resolvable manifest
      # exists. `cache: pip` with no requirements.txt/pyproject.toml/setup.cfg/etc
      # hard-fails setup-python ("No file matched ...") BEFORE any gate runs — the
      # observed fleet red on dep-less Python repos (codeblocks/devextreme/swfoc/
      # tanks). Cached path for manifest repos; plain path otherwise.
      #
      # round-3 FIX 3: even WITH a manifest, `cache: pip`'s DEFAULT hash glob is
      # only `**/requirements.txt` OR `**/pyproject.toml`. A repo whose sole
      # manifest is non-standard (requirements-dev.txt, requirements/*.txt) matches
      # neither and setup-python still hard-fails "No file matched ..." (observed:
      # codeblocks). We pass `cache-dependency-path` set to the ACTUAL detected
      # manifest paths so the cache key always hashes a real file. (Belt-and-braces:
      # the `if:` still requires pymanifest == 'true', so this only runs when at
      # least one manifest exists; setup-python cannot hard-fail before the gates.)
      - name: Set up Python (cached)
        if: steps.detect.outputs.python == 'true' && steps.detect.outputs.pymanifest == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: ${{ steps.detect.outputs.pymanifestpaths }}

      - name: Set up Python (no cache)
        if: steps.detect.outputs.python == 'true' && steps.detect.outputs.pymanifest == 'false'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up Node
        if: steps.detect.outputs.jsts == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ inputs.node-version }}

      # round-6: setup-go / setup-dotnet / setup-java / rust-toolchain were REMOVED.
      # They were added in round-5 FIX B solely so the caller pre-commit's
      # per-language autofixers (golangci-lint / dotnet-format / spotless /
      # clippy+rustfmt) had a toolchain. round-6 stopped running the caller
      # pre-commit and no remaining gate step invokes go/.NET/java/rust, so those
      # setups are dead weight. Python + Node (above) are the only toolchains the
      # surviving gates need (basedpyright/tsc/coverage + the self-contained ruff
      # and oxlint+biome lint/format lanes).

      # ── Pinned scanner CLIs (only when their language/config is present) ──────
      - name: Install ruff
        if: steps.detect.outputs.python == 'true'
        run: pip install ruff==0.15.17

      - name: Install basedpyright
        if: steps.detect.outputs.python == 'true'
        run: pip install basedpyright==1.39.8

      - name: Install opengrep
        if: steps.detect.outputs.opengrep == 'true'
        run: |
          curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash -s -- -v v1.22.0
          echo "$HOME/.opengrep/cli/latest" >> "$GITHUB_PATH"

      - name: Install gitleaks
        if: steps.detect.outputs.gitleaks == 'true'
        run: |
          curl -sSL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks

      - name: Install osv-scanner
        if: steps.detect.outputs.osv == 'true'
        run: |
          curl -sSL -o /usr/local/bin/osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v2.3.8/osv-scanner_linux_amd64
          chmod +x /usr/local/bin/osv-scanner

      # ── GATE 1 (ts/js) — SELF-CONTAINED lint + format (Oxlint + Biome) ───────
      # GAP 2 FIX — the lean charter's gate-1 for ts/js runs SELF-CONTAINED in THIS
      # workflow (the Reframe pattern), NOT the caller's ad-hoc eslint. A caller
      # .pre-commit-config.yaml that contains a repo-LOCAL `frontend-eslint`-style
      # hook shelling out to a not-yet-installed tool ("sh: 1: eslint: not found",
      # exit 127) used to short-circuit the whole gate-1 step (observed:
      # momentstudio). We therefore run the workflow's OWN pinned linter + formatter
      # over the caller's ts/js directly, independent of the caller's local hooks.
      # They need nothing from the caller (npx fetches the pinned CLIs).
      #
      # round-3 FIX 1 — FORMATTER SWAP (decided design): the format check is now
      # BIOME (formatter-only; linting stays with Oxlint), mirroring the PROVEN
      # Reframe lean gate (Prekzursil/Reframe .github/workflows/quality.yml +
      # biome.json: biome 2.5.0, `formatter.enabled`, `linter.enabled:false`,
      # `assist.enabled:false`). `biome ci --formatter-enabled --linter-enabled=false
      # --assist-enabled=false` is check-only (no writes) and exits non-zero on any
      # unformatted file. If the caller ships its OWN biome.json/biome.jsonc we honor
      # it (biome auto-discovers it from cwd); otherwise we point biome at the
      # template's bundled minimal config (docs/lean-gate/biome.template.json, the
      # same style as Reframe's: 2-space, single quotes, trailingCommas all,
      # semicolons always, lineWidth 100, lf) via --config-path so formatting is
      # deterministic across callers. Oxlint linting is unchanged. Pins: oxlint
      # 1.69.0 (mirrors Reframe), biome 2.5.0 (mirrors Reframe). Keep in sync with
      # docs/lean-gate/pre-commit-config.template.yaml + docs/lean-gate/biome.template.json.
      - name: gate-lint-format-jsts (self-contained oxlint + biome)
        if: steps.detect.outputs.jsts == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::oxlint@1.69.0 (--deny-warnings)"
          # --no-error-on-unmatched-pattern: when a caller has NO first-party
          # lintable JS (everything ignored/vendored), oxlint otherwise exits 1
          # with "No files found to lint" — a false FAIL. With the flag, an empty
          # match set exits 0 (PASS). This does NOT weaken the gate: when lintable
          # JS exists, --deny-warnings still runs and still fails on any warning.
          # **/*.min.js (and node_modules above) are obvious build artifacts that
          # must never be linted; real source is NOT broadly ignored.
          npx --yes oxlint@1.69.0 --deny-warnings \
            --no-error-on-unmatched-pattern \
            --ignore-pattern '**/node_modules/**' \
            --ignore-pattern '**/dist/**' \
            --ignore-pattern '**/build/**' \
            --ignore-pattern '**/out/**' \
            --ignore-pattern '**/.venv/**' \
            --ignore-pattern '**/vendor/**' \
            --ignore-pattern '**/*.min.js' \
            .
          echo "::endgroup::"
          echo "::group::biome@2.5.0 (format --check, formatter-only)"
          # Honor a caller-shipped biome config if present (biome auto-discovers
          # biome.json/biome.jsonc from cwd); otherwise use the template's bundled
          # minimal config so formatting is deterministic across callers.
          biome_cfg_args=()
          if [ ! -f biome.json ] && [ ! -f biome.jsonc ]; then
            tmp_biome_dir="$(mktemp -d)"
            # Bundled minimal config (single-line printf to avoid any YAML/heredoc
            # indentation pitfalls). Mirrors Reframe's biome.json style.
            # NB: NO "vcs.useIgnoreFile" here — biome errors ("couldn't find an
            # ignore file") on a caller without a .gitignore; we exclude vendored
            # trees explicitly via files.includes negations instead. The config dir
            # is a mktemp dir OUTSIDE the scanned tree, so biome does not treat it
            # as a "nested root configuration".
            printf '%s' '{"$schema":"https://biomejs.dev/schemas/2.5.0/schema.json","files":{"includes":["**/*.ts","**/*.tsx","**/*.js","**/*.jsx","**/*.mjs","**/*.cjs","!**/node_modules/**","!**/dist/**","!**/build/**","!**/out/**","!**/.venv/**","!**/vendor/**"]},"formatter":{"enabled":true,"indentStyle":"space","indentWidth":2,"lineWidth":100,"lineEnding":"lf"},"javascript":{"formatter":{"quoteStyle":"single","trailingCommas":"all","semicolons":"always"}},"linter":{"enabled":false},"assist":{"enabled":false}}' > "$tmp_biome_dir/biome.json"
            biome_cfg_args=(--config-path "$tmp_biome_dir")
            echo "No caller biome.json/biome.jsonc - using the lean template's bundled biome config."
          else
            echo "Honoring caller-shipped biome config."
          fi
          # `biome ci` is the non-mutating check command; restrict it to the
          # formatter (linting is Oxlint's job, assist disabled).
          npx --yes @biomejs/biome@2.5.0 ci \
            --formatter-enabled=true --linter-enabled=false --assist-enabled=false \
            "${biome_cfg_args[@]}" . || {
            echo "FAIL gate-lint-format-jsts: biome found unformatted ts/js (run 'biome format --write' / the biome pre-commit hook to fix)." >&2
            exit 1
          }
          echo "::endgroup::"

      # ── GATE 1 (py) — SELF-CONTAINED lint + format (Ruff) ───────────────────
      # round-6 FIX — the lean charter's Python lint/format runs the workflow's OWN
      # pinned ruff directly, NOT the caller's `.pre-commit-config.yaml`. The old
      # `gate-lint-format-secrets` step ran `pre-commit run --all-files`, which
      # dragged in each repo's BESPOKE pre-commit env (a root npm lockfile for the
      # frontend-eslint hook's `npm ci`, the .NET SDK for dotnet-format, caller-
      # local eslint/tsc/prettier, ...) and red-failed for caller-ENVIRONMENT
      # reasons even when the repo's real lean quality was fine. We now run ruff
      # ourselves: `ruff check` (lint) + `ruff format --check` (format), honoring a
      # caller [tool.ruff] in pyproject.toml or a ruff.toml/.ruff.toml when present
      # (ruff auto-discovers it from cwd); otherwise ruff's own defaults apply.
      # This is NOT weakening — ruff is the SAME charter tool the pre-commit hook
      # ran (pinned to Reframe's ruff 0.15.17); ruff lint issues or unformatted
      # Python still FAIL. Pin: ruff 0.15.17 (mirrors Reframe). Keep in sync with
      # docs/lean-gate/pre-commit-config.template.yaml.
      - name: gate-lint-format-py (self-contained ruff)
        if: steps.detect.outputs.python == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::ruff check (lint)"
          # --output-format=github surfaces findings as GH annotations. ruff honors
          # a caller [tool.ruff]/ruff.toml automatically (cwd discovery); no caller
          # pre-commit/eslint/SDK environment is touched.
          ruff check --output-format=github .
          echo "::endgroup::"
          echo "::group::ruff format --check"
          ruff format --check . || {
            echo "FAIL gate-lint-format-py: ruff found unformatted Python (run 'ruff format' / the ruff pre-commit hook to fix)." >&2
            exit 1
          }
          echo "::endgroup::"

      # ── GATE 2 — types ────────────────────────────────────────────────────
      # tsc per tsconfig.json so monorepo / nested-project shapes (e.g. an `ui/`
      # subproject with its own tsconfig and no root tsconfig — event-link) are
      # type-checked instead of hard-failing. Root tsconfig => `tsc --noEmit`;
      # otherwise discover every nested tsconfig and run `tsc -p <dir> --noEmit`.
      # Each project's deps are installed from its own package.json when present.
      - name: gate-types tsc
        if: steps.detect.outputs.ts == 'true'
        shell: bash
        run: |
          set -euo pipefail
          install_deps() { # $1 = dir containing package.json
            if [ -f "$1/package.json" ]; then
              ( cd "$1" && { npm ci || npm install; } )
            fi
          }
          if [ -f tsconfig.json ]; then
            install_deps .
            npx --yes tsc --noEmit
          else
            # No root tsconfig — discover nested project configs (excluding vendored trees).
            mapfile -t configs < <(git ls-files '**/tsconfig.json' tsconfig*.json \
              | grep -Ev '(^|/)(node_modules|dist|out|build|\.venv)/' || true)
            if [ "${#configs[@]}" -eq 0 ]; then
              echo "ts/tsx present but no tsconfig.json (root or nested) - nothing for tsc to check."
              exit 0
            fi
            for cfg in "${configs[@]}"; do
              dir="$(dirname "$cfg")"
              echo "::group::tsc -p $cfg"
              install_deps "$dir"
              ( cd "$dir" && npx --yes tsc -p "$(basename "$cfg")" --noEmit )
              echo "::endgroup::"
            done
          fi

      # round-5 FIX A — basedpyright at the STANDARD bar (consistency with Reframe).
      # basedpyright's DEFAULT mode is stricter than upstream pyright: it turns on
      # reportAny / reportUnknown* / reportUnusedCallResult, which flood untyped
      # utility scripts with thousands of non-bug "errors" (observed: momentstudio
      # 2774, swfoc 39, pbinfo 11 — all from scripts/utils). Reframe runs basedpyright
      # at typeCheckingMode = "standard" via [tool.basedpyright]. So: if the CALLER
      # ships a basedpyright/pyright config (pyrightconfig.json, basedpyrightconfig.json,
      # or a pyproject.toml with a [tool.(based)pyright] table) we honor it verbatim
      # (run basedpyright as-is); otherwise we pass `--typecheckingmode standard` so
      # the gate uses the proven standard bar instead of basedpyright's stricter
      # default. This is NOT weakening — standard is the proven bar and reportAny-
      # everywhere is gold-plating; REAL type errors at standard level still FAIL.
      - name: gate-types basedpyright
        if: steps.detect.outputs.python == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.detect.outputs.pyrightcfg }}" = "true" ]; then
            echo "Honoring caller-shipped basedpyright/pyright config (running as-is)."
            basedpyright
          else
            echo "No caller basedpyright/pyright config - using standard typeCheckingMode (mirrors Reframe)."
            basedpyright --typecheckingmode standard
          fi

      # ── GATE 3 — tests + coverage (STRICT 100% line+branch) ───────────────
      # Python via coverage.py; JS/TS via the caller's `test:coverage` script.
      # SILENT-PASS HOLE CLOSED: the old guard `&& hashFiles(pyproject/setup.cfg/
      # tox.ini)` let a Python repo with code but no coverage config pass GREEN
      # without ever measuring coverage. Now: if Python source exists we ALWAYS
      # measure. The ONLY skip is the documented narrow case — Python source with
      # ZERO test files (no tests, no coverage config) = "no test surface by
      # design". Source + tests but no cov config (or source + cov config) => FAIL
      # unless 100%. The 100% gate cannot pass unmeasured.
      - name: gate-tests-coverage python
        if: steps.detect.outputs.python == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.detect.outputs.pycovcfg }}" != "true" ] && [ "${{ steps.detect.outputs.pytests }}" != "true" ]; then
            echo "Python source present with NO test files and NO coverage config - no test surface by design; coverage lane skipped."
            exit 0
          fi
          if [ "${{ steps.detect.outputs.pycovcfg }}" != "true" ] && [ "${{ steps.detect.outputs.pytests }}" == "true" ]; then
            echo "FAIL gate-tests-coverage python: Python source + tests are present but no coverage config (pyproject.toml/setup.cfg/tox.ini/.coveragerc/pytest.ini) - the 100% gate cannot pass unmeasured. Add coverage config." >&2
            exit 1
          fi
          # GAP 1 FIX — install the CALLER's Python RUNTIME deps before running the
          # tests. Without this, a repo whose tests import a runtime dependency
          # fails with ModuleNotFoundError (observed: env-inspector -> "No module
          # named defusedxml"; the lane previously installed only pytest/coverage).
          # Priority order: requirements*.txt -> pyproject.toml / setup.cfg /
          # setup.py (PEP 517 install of the project itself, which pulls its
          # declared dependencies, incl. Poetry's [tool.poetry.dependencies]).
          # If NONE exist the repo is pure-stdlib -> proceed (no-op). Best-effort:
          # a failing optional/heavy install must not mask the real test result,
          # so each install is guarded and only logged on failure.
          installed_runtime_deps=false
          mapfile -t reqs < <(git ls-files \
            requirements.txt 'requirements/*.txt' 'requirements-*.txt' 'requirements*.txt' \
            '**/requirements.txt' 2>/dev/null \
            | grep -Ev '(^|/)(node_modules|\.venv|venv|dist|build|out)/' \
            | grep -Eiv 'requirements.*(dev|test|lint|doc|ci).*\.txt$' || true)
          if [ "${#reqs[@]}" -gt 0 ]; then
            for r in "${reqs[@]}"; do
              echo "::group::pip install -r $r"
              pip install -r "$r" || echo "WARN: 'pip install -r $r' failed; continuing (tests will surface any missing import)."
              echo "::endgroup::"
            done
            installed_runtime_deps=true
          elif [ -f pyproject.toml ] || [ -f setup.cfg ] || [ -f setup.py ]; then
            echo "::group::pip install . (project deps from pyproject/setup.cfg/setup.py)"
            pip install . || echo "WARN: 'pip install .' failed; continuing (tests will surface any missing import)."
            echo "::endgroup::"
            installed_runtime_deps=true
          fi
          [ "$installed_runtime_deps" = "true" ] || echo "No Python runtime manifest (requirements*.txt / pyproject.toml / setup.cfg / setup.py) - assuming pure-stdlib; proceeding."
          if grep -rqs 'pytest' pyproject.toml setup.cfg tox.ini pytest.ini 2>/dev/null; then
            pip install pytest pytest-cov
            python -m pytest --cov --cov-branch --cov-fail-under=100
          else
            pip install coverage
            python -m coverage run -m unittest discover
            python -m coverage report --fail-under=100 --show-missing
          fi

      # SILENT-PASS HOLE CLOSED: the old else-branch printed a message and passed
      # GREEN when ts/js source existed but no `test:coverage` script — code with
      # zero measured coverage slipped through the 100% gate. Now: if a coverage
      # script (or vitest/jest coverage equivalent) is present we run it; if ts/js
      # source + tests exist but no coverage script => FAIL. The ONLY skip is the
      # documented narrow case — ts/js source with ZERO test files = "no test
      # surface by design". A ts/js repo with code + tests but no coverage script
      # must NOT pass unmeasured.
      #
      # round-3 FIX 5 — NESTED-MONOREPO DISCOVERY: the coverage lane used to inspect
      # ONLY the ROOT package.json, so a nested project (the package.json lives in a
      # subdir, root has none — observed: webcoder, package.json in frontend/
      # webcoder_ui) hard-FAILED "no coverage script" even though the nested project
      # has one. Mirror the tsc lane (round-1 FIX): if there is a root package.json
      # use it; otherwise DISCOVER every nested package.json (excluding vendored
      # trees) and run coverage in each project dir that has a coverage script /
      # vitest|jest --coverage test script. The silent-pass hole stays closed: a
      # nested project with test files but NO coverage runner FAILS; the only skip
      # is the documented "no test surface by design" (zero ts/js test files).
      - name: gate-tests-coverage jsts
        if: steps.detect.outputs.jsts == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # has_cov_lane: does <dir>/package.json define a runnable coverage lane?
          # Echoes "script" (test:coverage) | "runner" (vitest/jest --coverage in
          # `test`) | "" (none). Reads only that dir's package.json.
          has_cov_lane() {
            # NB: node's require() treats a bare path ('dir/package.json') as a
            # MODULE lookup, not a relative file - it MUST be './'-prefixed. With
            # d='.' this yields './././package.json' (valid); with a nested dir it
            # yields './frontend/ui/package.json' (valid).
            local d="./$1"
            if node -e "process.exit((require('$d/package.json').scripts||{})['test:coverage']?0:1)" 2>/dev/null; then
              echo "script"; return 0
            fi
            if node -e "const s=(require('$d/package.json').scripts||{}).test||'';process.exit(/(vitest|jest).*--coverage|--coverage.*(vitest|jest)/.test(s)?0:1)" 2>/dev/null; then
              echo "runner"; return 0
            fi
            echo ""; return 0
          }
          run_cov_in_dir() { # $1 dir, $2 lane-kind
            echo "::group::coverage in $1 ($2)"
            ( cd "$1" && { npm ci || npm install; } \
              && if [ "$2" = "script" ]; then npm run test:coverage; else npm test; fi )
            echo "::endgroup::"
          }
          # Build the candidate project dir list: root if it has package.json,
          # otherwise every nested package.json dir (excluding vendored trees).
          declare -a proj_dirs=()
          if [ -f package.json ]; then
            proj_dirs=(.)
          else
            mapfile -t pkgs < <(git ls-files '**/package.json' \
              | grep -Ev '(^|/)(node_modules|dist|out|build|\.venv|vendor)/' || true)
            for p in "${pkgs[@]}"; do proj_dirs+=("$(dirname "$p")"); done
          fi
          ran_any=false
          if [ "${#proj_dirs[@]}" -gt 0 ]; then
            for d in "${proj_dirs[@]}"; do
              lane="$(has_cov_lane "$d")"
              if [ -n "$lane" ]; then
                run_cov_in_dir "$d" "$lane"
                ran_any=true
              fi
            done
          fi
          if [ "$ran_any" = "true" ]; then
            echo "PASS gate-tests-coverage jsts: ran coverage in ${#proj_dirs[@]} project dir(s)."
          elif [ "${{ steps.detect.outputs.jststests }}" != "true" ]; then
            echo "ts/js source present with NO test files and no coverage script - no test surface by design; coverage lane skipped."
            exit 0
          else
            echo "FAIL gate-tests-coverage jsts: ts/js present (with test files) but no coverage script in any project dir (root or nested) - the 100% gate cannot pass unmeasured. Add a 'test:coverage' npm script (or a vitest/jest '--coverage' test script) in the project package.json." >&2
            exit 1
          fi

      # ── GATE 4 — SAST (opengrep, curated in-repo ruleset, clean-zero) ─────
      - name: gate-sast opengrep
        if: steps.detect.outputs.opengrep == 'true'
        run: |
          opengrep scan --config .quality/opengrep --error \
            --exclude .venv --exclude node_modules --exclude dist --exclude out --exclude build \
            ${{ inputs.opengrep-paths }}

      # ── GATE 5 (verify) — secrets, gitleaks over working tree (0 findings) ─
      # round-6 FIX — gitleaks is now ALWAYS self-contained: it runs whenever the
      # caller ships a .gitleaks.toml allowlist, regardless of any pre-commit config
      # (the caller pre-commit is no longer executed). Honors the caller's
      # .gitleaks.toml allowlist. Findings still FAIL the gate. Pin: gitleaks
      # 8.30.1 (mirrors Reframe), installed above.
      - name: gate-secrets gitleaks (self-contained)
        if: steps.detect.outputs.gitleaks == 'true'
        run: gitleaks detect --no-banner --redact --config .gitleaks.toml

      # ── GATE 6 — deps (osv-scanner, 0 actionable CVEs) ───────────────────
      # osv-scanner exits 128 ("no package sources found") on a zero-dependency
      # repo. Round-1 added an `osvsources` pre-check (skip when no manifest glob
      # matched). Round-3 FIX 4: that pre-check alone was NOT enough — a repo can
      # match a manifest glob yet still have NOTHING osv-scanner recognizes as a
      # scannable package source (e.g. a `pom.xml`/`pyproject.toml` with no
      # resolvable deps, or only files osv treats as non-lockfiles), so the scanner
      # still exits 128 (observed fleet red: star-wars, a zero-dependency repo).
      # The authoritative "nothing to scan" signal is osv-scanner's OWN exit 128.
      # We therefore: (1) keep the cheap pre-check skip, AND (2) run the scanner
      # without aborting the step on its exit, then map exit 128 ("no package
      # sources found") to PASS. Any OTHER non-zero exit (e.g. 1 = vulnerabilities
      # found) still fails the gate. "Nothing to scan" is not a failure.
      - name: gate-deps osv-scanner
        if: steps.detect.outputs.osv == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.detect.outputs.osvsources }}" != "true" ]; then
            echo "No dependency manifests or lockfiles present - nothing for osv-scanner to scan; deps gate passes."
            exit 0
          fi
          rc=0
          osv-scanner scan source --config=osv-scanner.toml --recursive . || rc=$?
          if [ "$rc" -eq 0 ]; then
            echo "PASS gate-deps: osv-scanner found 0 actionable CVEs."
          elif [ "$rc" -eq 128 ]; then
            echo "osv-scanner exited 128 (no package sources found) - nothing to scan; deps gate passes."
          else
            echo "FAIL gate-deps: osv-scanner exited $rc (vulnerabilities found or scanner error)." >&2
            exit "$rc"
          fi

      # ── Charter ↔ active-gate consistency (fails if gate set != 6-charter) ─
      - name: charter-check
        if: steps.detect.outputs.charter == 'true'
        run: bash .quality/charter_check.sh
