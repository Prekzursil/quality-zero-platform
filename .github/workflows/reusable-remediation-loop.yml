name: Reusable Remediation Loop

permissions: {}

on:
  workflow_call:
    inputs:
      repo_slug:
        type: string
        required: true
      failure_context:
        type: string
        required: false
        default: Quality Zero Gate
      sha:
        type: string
        required: false
        default: ""
      max_attempts:
        type: number
        required: false
        default: 3
      platform_repository:
        type: string
        required: false
        default: Prekzursil/quality-zero-platform
      platform_ref:
        type: string
        required: false
        default: main
    secrets:
      CODEX_AUTH_JSON:
        required: false

jobs:
  resolve-profile:
    name: Resolve Remediation Profile
    runs-on: ubuntu-latest
    outputs:
      verify_command: ${{ steps.profile.outputs.verify_command }}
      github_mutation_lane: ${{ steps.profile.outputs.github_mutation_lane }}
      codex_auth_lane: ${{ steps.profile.outputs.codex_auth_lane }}
      provider_ui_mode: ${{ steps.profile.outputs.provider_ui_mode }}
      codex_auth_file: ${{ steps.profile.outputs.codex_auth_file }}
      codex_runner_labels_json: ${{ steps.profile.outputs.codex_runner_labels_json }}
      branch: ${{ steps.naming.outputs.branch }}
      title: ${{ steps.naming.outputs.title }}
      short_sha: ${{ steps.naming.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.platform_repository }}
          ref: ${{ inputs.platform_ref }}
          path: platform
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install platform dependencies
        run: python -m pip install -r platform/requirements-dev.txt
      - name: Export resolved profile
        id: profile
        env:
          REPO_SLUG: ${{ inputs.repo_slug }}
        run: |
          python platform/scripts/quality/export_profile.py \
            --repo-slug "$REPO_SLUG" \
            --event-name pull_request \
            --out-json "$RUNNER_TEMP/profile.json" \
            --github-output "$GITHUB_OUTPUT"
      - name: Compute remediation refs
        id: naming
        env:
          FAILURE_CONTEXT: ${{ inputs.failure_context }}
          HEAD_SHA: ${{ inputs.sha || github.sha }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          context = (os.environ.get("FAILURE_CONTEXT") or "quality-zero-gate").strip()
          raw_sha = (os.environ.get("HEAD_SHA") or "unknown").strip()
          short_sha = raw_sha[:7] if raw_sha else "unknown"
          slug = re.sub(r"[^a-z0-9]+", "-", context.lower()).strip("-") or "quality-zero-gate"
          branch = f"codex/fix/{slug}/{short_sha}"
          title = f"[codex] Remediate: {context}"

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
              handle.write(f"branch={branch}\n")
              handle.write(f"title={title}\n")
              handle.write(f"short_sha={short_sha}\n")
          PY

  remediate:
    name: Codex Remediation
    needs: resolve-profile
    if: ${{ needs.resolve-profile.outputs.github_mutation_lane == 'codex-private-runner' }}
    runs-on: ${{ fromJSON(needs.resolve-profile.outputs.codex_runner_labels_json) }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Guard retry budget
        if: ${{ github.run_attempt > inputs.max_attempts }}
        env:
          MAX_ATTEMPTS: ${{ inputs.max_attempts }}
        run: |
          echo "Retry budget exhausted on run attempt ${GITHUB_RUN_ATTEMPT} (max ${MAX_ATTEMPTS})." >&2
          exit 1
      - uses: actions/checkout@v4
        with:
          path: repo
          persist-credentials: false
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.platform_repository }}
          ref: ${{ inputs.platform_ref }}
          path: platform
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install platform dependencies
        run: python -m pip install -r platform/requirements-dev.txt
      - name: Verify Codex CLI
        run: codex --version
      - name: Export resolved profile
        env:
          REPO_SLUG: ${{ inputs.repo_slug }}
        run: |
          python platform/scripts/quality/export_profile.py \
            --repo-slug "$REPO_SLUG" \
            --event-name pull_request \
            --out-json "$RUNNER_TEMP/profile.json"
      - name: Ensure Codex account auth
        env:
          CODEX_AUTH_FILE: ${{ needs.resolve-profile.outputs.codex_auth_file }}
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          python platform/scripts/quality/ensure_codex_auth.py \
            --auth-file "$CODEX_AUTH_FILE" \
            --bootstrap-env-var CODEX_AUTH_JSON \
            --out-json "$RUNNER_TEMP/codex-auth.json"
      - name: Download quality-rollup artifact
        uses: actions/download-artifact@v4
        with:
          name: quality-rollup
          path: "${{ runner.temp }}/quality-rollup"
        continue-on-error: true
      - name: Auto-apply deterministic patches from canonical.json
        if: ${{ hashFiles(format('{0}/quality-rollup/canonical.json', runner.temp)) != '' }}
        working-directory: repo
        run: |
          python platform/scripts/quality/rollup_v2/apply_deterministic_patches.py \
            --canonical-json "$RUNNER_TEMP/quality-rollup/canonical.json" \
            --repo-dir . \
            --out-json "$RUNNER_TEMP/applied-patches.json"
      - name: Commit deterministic fixes
        if: ${{ hashFiles(format('{0}/applied-patches.json', runner.temp)) != '' }}
        working-directory: repo
        run: |
          git add -A
          APPLIED_COUNT=$(python -c "import json,sys; print(json.load(open(sys.argv[1]))['applied_count'])" "$RUNNER_TEMP/applied-patches.json")
          if [ "$APPLIED_COUNT" -gt 0 ]; then
            git diff --cached --quiet || \
              git commit -m "fix: auto-apply $APPLIED_COUNT deterministic patches from rollup_v2"
          fi
      - name: Render remediation prompt
        env:
          REPO_SLUG: ${{ inputs.repo_slug }}
          FAILURE_CONTEXT: ${{ inputs.failure_context }}
          TARGET_SHA: ${{ inputs.sha || github.sha }}
          ACTIONS_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          CANONICAL_ARG=""
          if [ -f "$RUNNER_TEMP/quality-rollup/canonical.json" ]; then
            CANONICAL_ARG="--canonical-json $RUNNER_TEMP/quality-rollup/canonical.json"
          fi
          python platform/scripts/quality/render_codex_prompt.py \
            --repo-slug "$REPO_SLUG" \
            --lane remediation \
            --event-name pull_request \
            --failure-context "$FAILURE_CONTEXT" \
            --artifact "Actions run: $ACTIONS_RUN_URL" \
            --artifact "Target SHA: $TARGET_SHA" \
            $CANONICAL_ARG \
            --output "$RUNNER_TEMP/remediation-prompt.md"
      - name: Run Codex on the trusted private runner
        run: |
          python platform/scripts/quality/run_codex_exec.py \
            --repo-dir repo \
            --prompt-file "$RUNNER_TEMP/remediation-prompt.md" \
            --output-last-message "$RUNNER_TEMP/codex-last-message.txt" \
            --json-log "$RUNNER_TEMP/codex-events.jsonl"
      - name: Post-remediation blocked-paths check (§B.3.17)
        working-directory: repo
        run: |
          BLOCKED_PATTERNS=(
            ".github/**"
            "Dockerfile"
            "docker-compose*.yml"
            "requirements*.txt"
            "pyproject.toml"
            "setup.py"
            ".npmrc"
            ".pip/pip.conf"
          )
          VIOLATIONS=""
          CHANGED=$(git diff --no-renames --name-only HEAD 2>/dev/null || true)
          if [ -z "$CHANGED" ]; then
            echo "No file changes detected after remediation."
            exit 0
          fi
          for pattern in "${BLOCKED_PATTERNS[@]}"; do
            MATCHES=$(echo "$CHANGED" | python3 -c "
          import fnmatch, sys
          pattern = '$pattern'
          for line in sys.stdin:
              line = line.strip()
              if fnmatch.fnmatch(line, pattern):
                  print(line)
          " || true)
            if [ -n "$MATCHES" ]; then
              VIOLATIONS="${VIOLATIONS}${MATCHES}"$'\n'
            fi
          done
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Post-remediation blocked-paths violation (§B.3.17):"
            echo "$VIOLATIONS" | sort -u
            echo "Codex remediation touched protected infrastructure files. Aborting PR creation."
            exit 1
          fi
          echo "Post-remediation blocked-paths check passed."
      - name: Upload Codex execution artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-remediation-artifacts
          path: |
            ${{ runner.temp }}/codex-auth.json
            ${{ runner.temp }}/codex-last-message.txt
            ${{ runner.temp }}/codex-events.jsonl
            ${{ runner.temp }}/remediation-prompt.md
            ${{ runner.temp }}/applied-patches.json
      - name: Create or update remediation pull request
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c
        with:
          path: repo
          branch: ${{ needs.resolve-profile.outputs.branch }}
          title: ${{ needs.resolve-profile.outputs.title }}
          delete-branch: false
          commit-message: |
            fix: remediate ${{ inputs.failure_context }}

            Co-authored-by: Codex <noreply@openai.com>
          body: |
            Automated remediation for `${{ inputs.failure_context }}` on `${{ inputs.repo_slug }}`.

            - Source SHA: `${{ inputs.sha || github.sha }}`
            - Branch: `${{ needs.resolve-profile.outputs.branch }}`
            - Verify command: `${{ needs.resolve-profile.outputs.verify_command }}`
            - Mutation lane: `${{ needs.resolve-profile.outputs.github_mutation_lane }}`
            - Auth lane: `${{ needs.resolve-profile.outputs.codex_auth_lane }}`
            - Provider UI mode: `${{ needs.resolve-profile.outputs.provider_ui_mode }}`
            - Trusted runner labels: `${{ needs.resolve-profile.outputs.codex_runner_labels_json }}`
