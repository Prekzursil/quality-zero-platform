name: Reusable Scanner Matrix

permissions: {}

on:
  workflow_call:
    inputs:
      repo_slug:
        type: string
        required: true
      event_name:
        type: string
        required: false
        default: pull_request
      branch_name:
        type: string
        required: false
        default: ""
      pull_request_number:
        type: string
        required: false
        default: ""
      pull_request_author:
        type: string
        required: false
        default: ""
      pull_request_head_ref:
        type: string
        required: false
        default: ""
      sha:
        type: string
        required: false
        default: ""
      platform_repository:
        type: string
        required: false
        default: Prekzursil/quality-zero-platform
      platform_ref:
        type: string
        required: false
        default: main
      coverage_runner:
        type: string
        required: false
        default: ubuntu-latest
    secrets:
      SONAR_TOKEN:
        required: false
      CODACY_API_TOKEN:
        required: false
      CODECOV_TOKEN:
        required: false
      CHROMATIC_PROJECT_TOKEN:
        required: false
      APPLITOOLS_API_KEY:
        required: false
      CODEX_AUTH_JSON:
        required: false
      SENTRY_AUTH_TOKEN:
        required: false
      DEEPSOURCE_DSN:
        required: false
      DEEPSCAN_API_TOKEN:
        required: false

jobs:
  scanner:
    name: ${{ matrix.job_name }}
    runs-on: ${{ matrix.lane == 'coverage' && (inputs.repo_slug == 'Prekzursil/SWFOC-Mod-Menu' || inputs.repo_slug == 'Prekzursil/codex-session-manager') && 'windows-latest' || 'ubuntu-latest' }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - job_name: Quality Secrets Preflight
            lane: secrets
          - job_name: Coverage 100 Gate
            lane: coverage
          - job_name: QLTY Zero
            lane: qlty_zero
          - job_name: Sonar Zero
            lane: sonar
          - job_name: Codacy Zero
            lane: codacy
          - job_name: Semgrep Zero
            lane: semgrep
          - job_name: Sentry Zero
            lane: sentry
          - job_name: DeepScan Zero
            lane: deepscan
          - job_name: DeepSource Visible Zero
            lane: deepsource_visible
          - job_name: Dependency Alerts
            lane: deps
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
          ref: ${{ inputs.sha != '' && inputs.sha || github.sha }}
          persist-credentials: false
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.platform_repository }}
          ref: ${{ inputs.platform_ref }}
          path: platform
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install platform dependencies
        run: python -m pip install -r platform/requirements-dev.txt
      - name: Export resolved profile
        id: profile
        shell: bash
        env:
          REPO_SLUG: ${{ inputs.repo_slug }}
          EVENT_NAME_INPUT: ${{ inputs.event_name }}
        run: |
          python platform/scripts/quality/export_profile.py \
            --repo-slug "$REPO_SLUG" \
            --event-name "$EVENT_NAME_INPUT" \
            --out-json "$RUNNER_TEMP/profile.json" \
            --github-output "$GITHUB_OUTPUT"
      - name: Install coverage system packages
        if: matrix.lane == 'coverage' && runner.os != 'Windows' && steps.profile.outputs.coverage_system_packages_json != '[]'
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          packages = json.loads(os.environ["PACKAGES_JSON"])
          if packages:
              subprocess.run(["sudo", "apt-get", "update"], check=True)
              subprocess.run(["sudo", "apt-get", "install", "-y", *packages], check=True)
          PY
        env:
          PACKAGES_JSON: ${{ steps.profile.outputs.coverage_system_packages_json }}
      - name: Set up Node
        if: matrix.lane == 'coverage' && steps.profile.outputs.coverage_node_version != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.profile.outputs.coverage_node_version }}
      - name: Set up Go
        if: matrix.lane == 'coverage' && steps.profile.outputs.coverage_go_version != ''
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.profile.outputs.coverage_go_version }}
      - name: Set up Java
        if: matrix.lane == 'coverage' && steps.profile.outputs.coverage_java_version != ''
        uses: actions/setup-java@v4
        with:
          distribution: ${{ steps.profile.outputs.coverage_java_distribution }}
          java-version: ${{ steps.profile.outputs.coverage_java_version }}
      - name: Set up .NET
        if: matrix.lane == 'coverage' && steps.profile.outputs.coverage_dotnet_version != ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ steps.profile.outputs.coverage_dotnet_version }}
      - name: Set up Rust
        if: matrix.lane == 'coverage' && steps.profile.outputs.coverage_needs_rust == 'true'
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
      - name: Install Qlty CLI
        if: steps.profile.outputs.qlty_enabled == 'true' && (matrix.lane == 'qlty_zero' || (matrix.lane == 'coverage' && steps.profile.outputs.qlty_coverage_files != '' && runner.os != 'Windows'))
        uses: qltysh/qlty-action/install@a19242102d17e497f437d7466aa01b528537e899
      - name: Run selected lane
        shell: bash
        env:
          LANE: ${{ matrix.lane }}
          EVENT_NAME: ${{ inputs.event_name }}
          GITHUB_TOKEN: ${{ github.token }}
          REPO_SLUG: ${{ inputs.repo_slug }}
          TARGET_SHA: ${{ inputs.sha != '' && inputs.sha || github.sha }}
          BRANCH_NAME: ${{ inputs.branch_name != '' && inputs.branch_name || github.head_ref || github.ref_name }}
          PULL_REQUEST_NUMBER: ${{ inputs.pull_request_number }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
          PULL_REQUEST_AUTHOR: ${{ inputs.pull_request_author }}
          PULL_REQUEST_HEAD_REF: ${{ inputs.pull_request_head_ref != '' && inputs.pull_request_head_ref || github.head_ref || '' }}
          QLTY_ENABLED: ${{ steps.profile.outputs.qlty_enabled }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY }}
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          DEEPSCAN_API_TOKEN: ${{ secrets.DEEPSCAN_API_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          DEEPSCAN_POLICY_MODE: ${{ vars.DEEPSCAN_POLICY_MODE }}
          DEEPSCAN_OPEN_ISSUES_URL: ${{ vars.DEEPSCAN_OPEN_ISSUES_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          import shlex
          import subprocess
          import sys
          from pathlib import Path

          root = Path.cwd()
          profile = json.loads((Path(os.environ["RUNNER_TEMP"]) / "profile.json").read_text(encoding="utf-8"))
          lane = os.environ["LANE"]
          branch_name = os.environ.get("BRANCH_NAME", "").strip()
          pull_request_number = os.environ.get("PULL_REQUEST_NUMBER", "").strip()
          issue_policy = profile.get("issue_policy", {})
          issue_mode = str(issue_policy.get("mode", "ratchet")).strip() or "ratchet"
          repo_dir = root / "repo"
          platform_dir = root / "platform"

          def run(cmd, *, cwd):
            subprocess.run(cmd, cwd=cwd, check=True)

          if lane == "secrets":
            cmd = [
              sys.executable,
              str(platform_dir / "scripts/quality/check_quality_secrets.py"),
              "--out-json",
              "quality-secrets/secrets.json",
              "--out-md",
              "quality-secrets/secrets.md",
            ]
            required_secrets = list(profile["required_secrets"])
            is_dependabot_origin = (
              os.environ.get("GITHUB_ACTOR_NAME") == "dependabot[bot]"
              or os.environ.get("PULL_REQUEST_AUTHOR") == "dependabot[bot]"
              or os.environ.get("PULL_REQUEST_HEAD_REF", "").startswith("dependabot/")
            )
            if os.environ.get("REPO_SLUG") == "Prekzursil/momentstudio" and is_dependabot_origin:
              required_secrets = [name for name in required_secrets if name != "CHROMATIC_PROJECT_TOKEN"]
            for name in required_secrets:
              cmd.extend(["--required-secret", name])
            for name in profile.get("conditional_secrets", []):
              cmd.extend(["--conditional-secret", name])
            for name in profile["required_vars"]:
              cmd.extend(["--required-var", name])
            run(cmd, cwd=repo_dir)
          elif lane == "coverage":
            cmd = [
              sys.executable,
              str(platform_dir / "scripts/quality/run_coverage_gate.py"),
              "--profile-json",
              str(Path(os.environ["RUNNER_TEMP"]) / "profile.json"),
              "--event-name",
              os.environ["EVENT_NAME"],
              "--repo-dir",
              str(repo_dir),
              "--platform-dir",
              str(platform_dir),
            ]
            run(cmd, cwd=repo_dir)
          elif lane == "qlty_zero":
            if os.environ.get("QLTY_ENABLED") != "true":
              print("QLTY is disabled for this profile; skipping QLTY Zero.")
              sys.exit(0)
            cmd = [
              sys.executable,
              str(platform_dir / "scripts/quality/run_qlty_zero.py"),
              "--repo-dir",
              str(repo_dir),
              "--out-json",
              "qlty-zero/qlty-zero.json",
              "--out-md",
              "qlty-zero/qlty-zero.md",
            ]
            run(cmd, cwd=repo_dir)
          elif lane == "sonar":
            sonar_field = "project" + "_key"
            sonar_project = profile["vendors"]["sonar"][sonar_field]
            cmd = [
              sys.executable,
              str(platform_dir / "scripts/quality/check_sonar_zero.py"),
              "--project-key",
              sonar_project,
              "--out-json",
              "sonar-zero/sonar.json",
              "--out-md",
              "sonar-zero/sonar.md",
              "--policy-mode",
              issue_mode,
              "--sha",
              os.environ["TARGET_SHA"],
            ]
            if pull_request_number:
              cmd.extend(["--pull-request", pull_request_number])
            elif branch_name:
              cmd.extend(["--branch", branch_name])
            run(cmd, cwd=repo_dir)
          elif lane == "codacy":
            codacy = profile["vendors"]["codacy"]
            cmd = [
              sys.executable,
              str(platform_dir / "scripts/quality/check_codacy_zero.py"),
              "--provider",
              codacy["provider"],
              "--owner",
              codacy["owner"],
              "--repo",
              codacy["repo"],
              "--out-json",
              "codacy-zero/codacy.json",
              "--out-md",
              "codacy-zero/codacy.md",
              "--policy-mode",
              issue_mode,
              "--sha",
              os.environ["TARGET_SHA"],
            ]
            if pull_request_number:
              cmd.extend(["--pull-request", pull_request_number])
            run(cmd, cwd=repo_dir)
          elif lane == "semgrep":
            run([sys.executable, "-m", "pip", "install", "semgrep"], cwd=repo_dir)
            run(["semgrep", "ci"], cwd=repo_dir)
          elif lane == "sentry":
            sentry = profile["vendors"]["sentry"]
            cmd = [
              sys.executable,
              str(platform_dir / "scripts/quality/check_sentry_zero.py"),
              "--org",
              os.environ.get(sentry["org_var"], ""),
              "--out-json",
              "sentry-zero/sentry.json",
              "--out-md",
              "sentry-zero/sentry.md",
            ]
            for project_var in sentry.get("project_vars", []):
              value = os.environ.get(project_var, "").strip()
              if value:
                cmd.extend(["--project", value])
            run(cmd, cwd=repo_dir)
          elif lane == "deepscan":
            cmd = [
              sys.executable,
              str(platform_dir / "scripts/quality/check_deepscan_zero.py"),
              "--out-json",
              "deepscan-zero/deepscan.json",
              "--out-md",
              "deepscan-zero/deepscan.md",
            ]
            run(cmd, cwd=repo_dir)
          elif lane == "deepsource_visible":
            if not profile.get("enabled_scanners", {}).get("deepsource_visible", False):
              print("DeepSource visible-zero lane is disabled for this profile; skipping.")
              sys.exit(0)
            cmd = [
              sys.executable,
              str(platform_dir / "scripts/quality/check_deepsource_zero.py"),
              "--out-json",
              "deepsource-visible-zero/deepsource.json",
              "--out-md",
              "deepsource-visible-zero/deepsource.md",
            ]
            run(cmd, cwd=repo_dir)
          elif lane == "deps":
            if not profile.get("enabled_scanners", {}).get("deps", False):
              print("Dependency alert lane is disabled for this profile; skipping.")
              sys.exit(0)
            deps = profile.get("deps", {})
            cmd = [
              sys.executable,
              str(platform_dir / "scripts/quality/check_dependabot_alerts.py"),
              "--repo",
              os.environ["REPO_SLUG"],
              "--policy",
              str(deps.get("policy", "zero_critical")),
              "--scope",
              str(deps.get("scope", "runtime")),
              "--out-json",
              "deps-zero/deps.json",
              "--out-md",
              "deps-zero/deps.md",
            ]
            run(cmd, cwd=repo_dir)
          else:
            raise SystemExit(f"Unsupported lane: {lane}")
          PY
      - name: SonarCloud scan
        if: matrix.lane == 'coverage' && env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@689fb39b34b9aa95ebc5f8f119343ddd51542402  # v4 — pinned per §A.2.4
        with:
          projectBaseDir: repo
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # Codecov upload removed from scanner-matrix per §7.3 — kept in reusable-codecov-analytics.yml only
      - name: Publish Qlty coverage
        if: matrix.lane == 'coverage' && steps.profile.outputs.qlty_enabled == 'true' && steps.profile.outputs.qlty_coverage_files != '' && runner.os != 'Windows'
        shell: bash
        working-directory: repo
        env:
          QLTY_COVERAGE_FILES: ${{ steps.profile.outputs.qlty_coverage_files }}
          TARGET_SHA: ${{ inputs.sha != '' && inputs.sha || github.sha }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import shutil
          import subprocess
          import sys
          import urllib.parse
          import urllib.request

          oidc_request_url = (
              f"{os.environ['ACTIONS_ID_TOKEN_REQUEST_URL']}"
              f"&audience={urllib.parse.quote('https://qlty.sh', safe='')}"
          )
          oidc_request = urllib.request.Request(
              oidc_request_url,
              headers={"Authorization": f"Bearer {os.environ['ACTIONS_ID_TOKEN_REQUEST_TOKEN']}"},
          )
          with urllib.request.urlopen(oidc_request) as response:
              oidc_payload = json.load(response)
          os.environ["QLTY_COVERAGE_" + "TOKEN"] = oidc_payload["value"]

          raw = os.environ["QLTY_COVERAGE_FILES"]
          items = []
          for chunk in raw.replace(",", "\n").splitlines():
              item = chunk.strip()
              if not item:
                  continue
              if item.startswith("repo/"):
                  item = item[len("repo/") :]
              items.append(item)
          candidate_roots = [Path.home()]
          if os.name == "nt":
              for env_name in ("USERPROFILE", "HOME"):
                  raw_home = os.environ.get(env_name, "").strip()
                  if not raw_home:
                      continue
                  candidate_roots.append(Path(raw_home))
                  if raw_home.startswith("/c/"):
                      candidate_roots.append(Path("C:/") / raw_home[3:])
                  elif raw_home.startswith("/mnt/c/"):
                      candidate_roots.append(Path("C:/") / raw_home[7:])
          candidate_paths = []
          for root in dict.fromkeys(candidate_roots):
              candidate_paths.append(root / ".qlty" / "bin" / "qlty.exe")
              candidate_paths.append(root / ".qlty" / "bin" / "qlty")
          qlty_executable = next((str(path) for path in candidate_paths if path.exists()), "")
          if not qlty_executable:
              qlty_executable = shutil.which("qlty.exe" if os.name == "nt" else "qlty")
          if not qlty_executable:
              qlty_executable = shutil.which("qlty")
          if not qlty_executable:
              raise SystemExit("Unable to locate qlty on PATH")
          normalize_command = [
              sys.executable,
              str((Path.cwd().parent / "platform" / "scripts/quality/normalize_coverage_for_qlty.py").resolve()),
              "--repo-dir",
              str(Path.cwd().resolve()),
              "--out-dir",
              ".qlty-coverage",
              *items,
          ]
          normalized_payload = json.loads(
              subprocess.run(
                  normalize_command,
                  check=True,
                  capture_output=True,
                  text=True,
                  env={
                      **os.environ,
                      "PYTHONPATH": str((Path.cwd().parent / "platform").resolve()),
                  },
              ).stdout
          )
          normalized_items = [entry["normalized"] for entry in normalized_payload]
          command = [
              "qlty",
              "coverage",
              "publish",
              "--override-commit-sha",
              os.environ["TARGET_SHA"],
              "--override-branch",
              os.environ["BRANCH_NAME"],
              "--output-dir",
              os.environ["RUNNER_TEMP"],
              *normalized_items,
          ]
          subprocess.run(command, executable=qlty_executable, check=True)
          PY
      - name: Publish Codacy coverage
        if: matrix.lane == 'coverage' && steps.profile.outputs.codacy_enabled == 'true' && steps.profile.outputs.coverage_input_files != ''
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699
        with:
          project-token: ${{ secrets.CODACY_API_TOKEN }}
          coverage-reports: ${{ steps.profile.outputs.coverage_input_files }}

      - name: Publish DeepSource coverage
        if: matrix.lane == 'coverage' && steps.profile.outputs.deepsource_enabled == 'true' && steps.profile.outputs.coverage_input_files != ''
        working-directory: repo
        env:
          DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}
        run: |
          curl -sSL https://deepsource.io/cli | sh
          IFS=',' read -ra FILES <<< "${{ steps.profile.outputs.coverage_input_files }}"
          for f in "${FILES[@]}"; do
            f=$(echo "$f" | xargs)
            [ -z "$f" ] && continue
            if echo "$f" | grep -qE '\.xml$'; then
              ./bin/deepsource report --analyzer test-coverage --key python --value-file "$f" || true
            elif echo "$f" | grep -qE 'lcov'; then
              ./bin/deepsource report --analyzer test-coverage --key javascript --value-file "$f" || true
            fi
          done

      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.lane }}-artifacts
          path: |
            repo/quality-secrets
            repo/coverage-100
            repo/qlty-zero
            repo/sonar-zero
            repo/codacy-zero
            repo/sentry-zero
            repo/deepscan-zero
            repo/deps-zero

  quality-rollup:
    name: Quality Rollup
    if: always()
    needs: scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.platform_repository }}
          ref: ${{ inputs.platform_ref }}
          path: platform
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install platform dependencies
        run: python -m pip install -r platform/requirements-dev.txt
      - name: Export resolved profile
        id: profile
        env:
          REPO_SLUG: ${{ inputs.repo_slug }}
          EVENT_NAME_INPUT: ${{ inputs.event_name }}
        run: |
          python platform/scripts/quality/export_profile.py \
            --repo-slug "$REPO_SLUG" \
            --event-name "$EVENT_NAME_INPUT" \
            --out-json "$RUNNER_TEMP/profile.json"
      - name: Download lane artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*-artifacts"
          merge-multiple: false
      - name: Build quality rollup
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ROLLUP_REPO_SLUG: ${{ inputs.repo_slug }}
          ROLLUP_SHA: ${{ inputs.sha != '' && inputs.sha || github.sha }}
        run: |
          python platform/scripts/quality/build_quality_rollup.py \
            --profile-json "$RUNNER_TEMP/profile.json" \
            --repo "$ROLLUP_REPO_SLUG" \
            --sha "$ROLLUP_SHA" \
            --artifacts-dir artifacts \
            --out-json quality-rollup/summary.json \
            --out-md quality-rollup/summary.md
      - name: Upload quality rollup
        uses: actions/upload-artifact@v4
        with:
          name: quality-rollup
          path: quality-rollup
      - name: Post sticky PR comment
        if: ${{ inputs.pull_request_number != '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ROLLUP_REPO_SLUG: ${{ inputs.repo_slug }}
          ROLLUP_PULL_REQUEST: ${{ inputs.pull_request_number }}
        run: |
          python platform/scripts/quality/post_pr_quality_comment.py \
            --repo "$ROLLUP_REPO_SLUG" \
            --pull-request "$ROLLUP_PULL_REQUEST" \
            --markdown-file quality-rollup/summary.md
