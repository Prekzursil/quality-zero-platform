name: Reusable Scanner Matrix

permissions: {}

on:
  workflow_call:
    inputs:
      repo_slug:
        type: string
        required: true
      event_name:
        type: string
        required: false
        default: pull_request
      branch_name:
        type: string
        required: false
        default: ""
      pull_request_number:
        type: string
        required: false
        default: ""
      pull_request_author:
        type: string
        required: false
        default: ""
      pull_request_head_ref:
        type: string
        required: false
        default: ""
      sha:
        type: string
        required: false
        default: ""
      platform_repository:
        type: string
        required: false
        default: Prekzursil/quality-zero-platform
      platform_ref:
        type: string
        required: false
        default: main
    secrets:
      SONAR_TOKEN:
        required: false
      CODACY_API_TOKEN:
        required: false
      CODECOV_TOKEN:
        required: false
      CHROMATIC_PROJECT_TOKEN:
        required: false
      APPLITOOLS_API_KEY:
        required: false
      CODEX_AUTH_JSON:
        required: false
      SENTRY_AUTH_TOKEN:
        required: false
      DEEPSCAN_API_TOKEN:
        required: false

jobs:
  scanner:
    name: ${{ matrix.job_name }}
    runs-on: ${{ inputs.repo_slug == 'Prekzursil/SWFOC-Mod-Menu' && 'windows-latest' || 'ubuntu-latest' }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - job_name: Quality Secrets Preflight
            lane: secrets
          - job_name: Coverage 100 Gate
            lane: coverage
          - job_name: QLTY Zero
            lane: qlty_zero
          - job_name: Sonar Zero
            lane: sonar
          - job_name: Codacy Zero
            lane: codacy
          - job_name: Semgrep Zero
            lane: semgrep
          - job_name: Sentry Zero
            lane: sentry
          - job_name: DeepScan Zero
            lane: deepscan
          - job_name: Dependency Alerts
            lane: deps
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
          ref: ${{ inputs.sha != '' && inputs.sha || github.sha }}
          persist-credentials: false
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.platform_repository }}
          ref: ${{ inputs.platform_ref }}
          path: platform
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install platform dependencies
        run: python -m pip install -r platform/requirements-dev.txt
      - name: Export resolved profile
        id: profile
        env:
          REPO_SLUG: ${{ inputs.repo_slug }}
          EVENT_NAME_INPUT: ${{ inputs.event_name }}
        run: |
          python platform/scripts/quality/export_profile.py \
            --repo-slug "$REPO_SLUG" \
            --event-name "$EVENT_NAME_INPUT" \
            --out-json "$RUNNER_TEMP/profile.json" \
            --github-output "$GITHUB_OUTPUT"
      - name: Install coverage system packages
        if: matrix.lane == 'coverage' && runner.os != 'Windows' && steps.profile.outputs.coverage_system_packages_json != '[]'
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          packages = json.loads(os.environ["PACKAGES_JSON"])
          if packages:
              subprocess.run(["sudo", "apt-get", "update"], check=True)
              subprocess.run(["sudo", "apt-get", "install", "-y", *packages], check=True)
          PY
        env:
          PACKAGES_JSON: ${{ steps.profile.outputs.coverage_system_packages_json }}
      - name: Set up Node
        if: matrix.lane == 'coverage' && steps.profile.outputs.coverage_node_version != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.profile.outputs.coverage_node_version }}
      - name: Set up Go
        if: matrix.lane == 'coverage' && steps.profile.outputs.coverage_go_version != ''
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.profile.outputs.coverage_go_version }}
      - name: Set up Java
        if: matrix.lane == 'coverage' && steps.profile.outputs.coverage_java_version != ''
        uses: actions/setup-java@v4
        with:
          distribution: ${{ steps.profile.outputs.coverage_java_distribution }}
          java-version: ${{ steps.profile.outputs.coverage_java_version }}
      - name: Set up .NET
        if: matrix.lane == 'coverage' && steps.profile.outputs.coverage_dotnet_version != ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ steps.profile.outputs.coverage_dotnet_version }}
      - name: Set up Rust
        if: matrix.lane == 'coverage' && steps.profile.outputs.coverage_needs_rust == 'true'
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
      - name: Install Qlty CLI
        if: steps.profile.outputs.qlty_enabled == 'true' && ((matrix.lane == 'coverage' && steps.profile.outputs.qlty_coverage_files != '') || matrix.lane == 'qlty_zero')
        uses: qltysh/qlty-action/install@a19242102d17e497f437d7466aa01b528537e899
      - name: Run selected lane
        env:
          LANE: ${{ matrix.lane }}
          EVENT_NAME: ${{ inputs.event_name }}
          GITHUB_TOKEN: ${{ github.token }}
          REPO_SLUG: ${{ inputs.repo_slug }}
          TARGET_SHA: ${{ inputs.sha != '' && inputs.sha || github.sha }}
          BRANCH_NAME: ${{ inputs.branch_name != '' && inputs.branch_name || github.head_ref || github.ref_name }}
          PULL_REQUEST_NUMBER: ${{ inputs.pull_request_number }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
          PULL_REQUEST_AUTHOR: ${{ inputs.pull_request_author }}
          PULL_REQUEST_HEAD_REF: ${{ inputs.pull_request_head_ref != '' && inputs.pull_request_head_ref || github.head_ref || '' }}
          QLTY_ENABLED: ${{ steps.profile.outputs.qlty_enabled }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY }}
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          DEEPSCAN_API_TOKEN: ${{ secrets.DEEPSCAN_API_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          DEEPSCAN_POLICY_MODE: ${{ vars.DEEPSCAN_POLICY_MODE }}
          DEEPSCAN_OPEN_ISSUES_URL: ${{ vars.DEEPSCAN_OPEN_ISSUES_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          import shlex
          import subprocess
          import sys
          from pathlib import Path

          root = Path.cwd()
          profile = json.loads((Path(os.environ["RUNNER_TEMP"]) / "profile.json").read_text(encoding="utf-8"))
          lane = os.environ["LANE"]
          branch_name = os.environ.get("BRANCH_NAME", "").strip()
          pull_request_number = os.environ.get("PULL_REQUEST_NUMBER", "").strip()
          issue_policy = profile.get("issue_policy", {})
          issue_mode = str(issue_policy.get("mode", "ratchet")).strip() or "ratchet"
          pr_issue_behavior = str(issue_policy.get("pr_behavior", "introduced_only")).strip() or "introduced_only"
          repo_dir = root / "repo"
          platform_dir = root / "platform"

          def run(cmd, *, cwd):
            subprocess.run(cmd, cwd=cwd, check=True)

          if lane == "secrets":
            cmd = [
              sys.executable,
              str(platform_dir / "scripts/quality/check_quality_secrets.py"),
              "--out-json",
              "quality-secrets/secrets.json",
              "--out-md",
              "quality-secrets/secrets.md",
            ]
            required_secrets = list(profile["required_secrets"])
            is_dependabot_origin = (
              os.environ.get("GITHUB_ACTOR_NAME") == "dependabot[bot]"
              or os.environ.get("PULL_REQUEST_AUTHOR") == "dependabot[bot]"
              or os.environ.get("PULL_REQUEST_HEAD_REF", "").startswith("dependabot/")
            )
            if os.environ.get("REPO_SLUG") == "Prekzursil/momentstudio" and is_dependabot_origin:
              required_secrets = [name for name in required_secrets if name != "CHROMATIC_PROJECT_TOKEN"]
            for name in required_secrets:
              cmd.extend(["--required-secret", name])
            for name in profile.get("conditional_secrets", []):
              cmd.extend(["--conditional-secret", name])
            for name in profile["required_vars"]:
              cmd.extend(["--required-var", name])
            run(cmd, cwd=repo_dir)
          elif lane == "coverage":
            cmd = [
              sys.executable,
              str(platform_dir / "scripts/quality/run_coverage_gate.py"),
              "--profile-json",
              str(Path(os.environ["RUNNER_TEMP"]) / "profile.json"),
              "--event-name",
              os.environ["EVENT_NAME"],
              "--repo-dir",
              str(repo_dir),
              "--platform-dir",
              str(platform_dir),
            ]
            run(cmd, cwd=repo_dir)
          elif lane == "qlty_zero":
            if os.environ.get("QLTY_ENABLED") != "true":
              print("QLTY is disabled for this profile; skipping QLTY Zero.")
              sys.exit(0)
            cmd = [
              sys.executable,
              str(platform_dir / "scripts/quality/run_qlty_zero.py"),
              "--repo-dir",
              str(repo_dir),
              "--out-json",
              "qlty-zero/qlty-zero.json",
              "--out-md",
              "qlty-zero/qlty-zero.md",
            ]
            run(cmd, cwd=repo_dir)
          elif lane == "sonar":
            project_key = profile["vendors"]["sonar"]["project_key"]
            cmd = [
              sys.executable,
              str(platform_dir / "scripts/quality/check_sonar_zero.py"),
              "--project-key",
              project_key,
              "--out-json",
              "sonar-zero/sonar.json",
              "--out-md",
              "sonar-zero/sonar.md",
              "--policy-mode",
              issue_mode,
            ]
            if pull_request_number and pr_issue_behavior == "introduced_only":
              cmd.extend(["--pull-request", pull_request_number])
            elif branch_name:
              cmd.extend(["--branch", branch_name])
            run(cmd, cwd=repo_dir)
          elif lane == "codacy":
            codacy = profile["vendors"]["codacy"]
            cmd = [
              sys.executable,
              str(platform_dir / "scripts/quality/check_codacy_zero.py"),
              "--provider",
              codacy["provider"],
              "--owner",
              codacy["owner"],
              "--repo",
              codacy["repo"],
              "--out-json",
              "codacy-zero/codacy.json",
              "--out-md",
              "codacy-zero/codacy.md",
              "--policy-mode",
              issue_mode,
            ]
            if pull_request_number and pr_issue_behavior == "introduced_only":
              cmd.extend(["--pull-request", pull_request_number])
            run(cmd, cwd=repo_dir)
          elif lane == "semgrep":
            run([sys.executable, "-m", "pip", "install", "semgrep"], cwd=repo_dir)
            run(["semgrep", "ci"], cwd=repo_dir)
          elif lane == "sentry":
            sentry = profile["vendors"]["sentry"]
            cmd = [
              sys.executable,
              str(platform_dir / "scripts/quality/check_sentry_zero.py"),
              "--org",
              os.environ.get(sentry["org_var"], ""),
              "--out-json",
              "sentry-zero/sentry.json",
              "--out-md",
              "sentry-zero/sentry.md",
            ]
            for project_var in sentry.get("project_vars", []):
              value = os.environ.get(project_var, "").strip()
              if value:
                cmd.extend(["--project", value])
            run(cmd, cwd=repo_dir)
          elif lane == "deepscan":
            cmd = [
              sys.executable,
              str(platform_dir / "scripts/quality/check_deepscan_zero.py"),
              "--out-json",
              "deepscan-zero/deepscan.json",
              "--out-md",
              "deepscan-zero/deepscan.md",
            ]
            run(cmd, cwd=repo_dir)
          elif lane == "deps":
            if not profile.get("enabled_scanners", {}).get("deps", False):
              print("Dependency alert lane is disabled for this profile; skipping.")
              sys.exit(0)
            deps = profile.get("deps", {})
            cmd = [
              sys.executable,
              str(platform_dir / "scripts/quality/check_dependabot_alerts.py"),
              "--repo",
              os.environ["REPO_SLUG"],
              "--policy",
              str(deps.get("policy", "zero_critical")),
              "--scope",
              str(deps.get("scope", "runtime")),
              "--out-json",
              "deps-zero/deps.json",
              "--out-md",
              "deps-zero/deps.md",
            ]
            run(cmd, cwd=repo_dir)
          else:
            raise SystemExit(f"Unsupported lane: {lane}")
          PY
      - name: Publish Codecov coverage
        if: matrix.lane == 'coverage' && steps.profile.outputs.codecov_enabled == 'true' && steps.profile.outputs.coverage_input_files != ''
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          files: ${{ steps.profile.outputs.coverage_input_files }}
          fail_ci_if_error: true
          use_oidc: ${{ secrets.CODECOV_TOKEN == '' }}
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
      - name: Publish Qlty coverage
        if: matrix.lane == 'coverage' && steps.profile.outputs.qlty_enabled == 'true' && steps.profile.outputs.qlty_coverage_files != ''
        shell: bash
        working-directory: repo
        env:
          QLTY_COVERAGE_FILES: ${{ steps.profile.outputs.qlty_coverage_files }}
          TARGET_SHA: ${{ inputs.sha != '' && inputs.sha || github.sha }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          OIDC_RESPONSE="$(curl -sSf -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https%3A%2F%2Fqlty.sh")"
          export QLTY_COVERAGE_TOKEN="$(python -c "import json,sys; print(json.load(sys.stdin)['value'])" <<<"$OIDC_RESPONSE")"
          python - <<'PY' > "$RUNNER_TEMP/qlty-coverage-files.txt"
          import os

          raw = os.environ["QLTY_COVERAGE_FILES"]
          items = []
          for chunk in raw.replace(",", "\n").splitlines():
              item = chunk.strip()
              if not item:
                  continue
              if item.startswith("repo/"):
                  item = item[len("repo/") :]
              items.append(item)
          print("\n".join(items))
          PY

          mapfile -t qlty_files < "$RUNNER_TEMP/qlty-coverage-files.txt"
          qlty coverage publish \
            --override-commit-sha "$TARGET_SHA" \
            --override-branch "$BRANCH_NAME" \
            --validate \
            --output-dir "$RUNNER_TEMP" \
            "${qlty_files[@]}"
      - name: Upload lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.lane }}-artifacts
          path: |
            repo/quality-secrets
            repo/coverage-100
            repo/qlty-zero
            repo/sonar-zero
            repo/codacy-zero
            repo/sentry-zero
            repo/deepscan-zero
            repo/deps-zero

  quality-rollup:
    name: Quality Rollup
    if: always()
    needs: scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.platform_repository }}
          ref: ${{ inputs.platform_ref }}
          path: platform
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install platform dependencies
        run: python -m pip install -r platform/requirements-dev.txt
      - name: Export resolved profile
        id: profile
        env:
          REPO_SLUG: ${{ inputs.repo_slug }}
          EVENT_NAME_INPUT: ${{ inputs.event_name }}
        run: |
          python platform/scripts/quality/export_profile.py \
            --repo-slug "$REPO_SLUG" \
            --event-name "$EVENT_NAME_INPUT" \
            --out-json "$RUNNER_TEMP/profile.json"
      - name: Download lane artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*-artifacts"
          merge-multiple: false
      - name: Build quality rollup
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ROLLUP_REPO_SLUG: ${{ inputs.repo_slug }}
          ROLLUP_SHA: ${{ inputs.sha != '' && inputs.sha || github.sha }}
        run: |
          python platform/scripts/quality/build_quality_rollup.py \
            --profile-json "$RUNNER_TEMP/profile.json" \
            --repo "$ROLLUP_REPO_SLUG" \
            --sha "$ROLLUP_SHA" \
            --artifacts-dir artifacts \
            --out-json quality-rollup/summary.json \
            --out-md quality-rollup/summary.md
      - name: Upload quality rollup
        uses: actions/upload-artifact@v4
        with:
          name: quality-rollup
          path: quality-rollup
      - name: Post sticky PR comment
        if: ${{ inputs.pull_request_number != '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ROLLUP_REPO_SLUG: ${{ inputs.repo_slug }}
          ROLLUP_PULL_REQUEST: ${{ inputs.pull_request_number }}
        run: |
          python platform/scripts/quality/post_pr_quality_comment.py \
            --repo "$ROLLUP_REPO_SLUG" \
            --pull-request "$ROLLUP_PULL_REQUEST" \
            --markdown-file quality-rollup/summary.md
