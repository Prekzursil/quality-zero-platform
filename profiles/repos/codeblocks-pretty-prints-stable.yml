slug: Prekzursil/codeblocks-pretty-prints-stable
stack: python-desktop
verify_command: bash scripts/verify
coverage:
  command: |
    python -m pip install --upgrade pip
    python -m pip install -r requirements-dev.txt
    npm ci
    bash scripts/verify
  inputs:
