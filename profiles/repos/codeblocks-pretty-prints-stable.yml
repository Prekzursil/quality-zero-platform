      name: repo
      path: build/coverage.xml
vendors:
  sonar:
    project_key: Prekzursil_codeblocks-pretty-prints-stable
codeql:
  languages:
    - actions
    - javascript-typescript
    - python
dependabot:
  updates:
    - ecosystem: pip
      directory: /
    - ecosystem: npm
      directory: /
