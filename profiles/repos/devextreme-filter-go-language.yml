slug: Prekzursil/DevExtreme-Filter-Go-Language
version: 2
stack: go
mode:
  phase: absolute
scanners: {}
overrides: []
verify_command: bash scripts/verify
coverage:
  branch_min_percent: null
  command: 'mkdir -p coverage

    packages="$(go list ./... | grep -vE "/ent($|/)")"

    rm -f coverage/go-coverage.out coverage_part.out

    first=1

    for pkg in $packages; do

      go test "$pkg" -coverprofile=coverage_part.out -covermode=count || true

      if [ -f coverage_part.out ]; then

        if [ "$first" -eq 1 ]; then cp coverage_part.out coverage/go-coverage.out; first=0;

        else tail -n +2 coverage_part.out >> coverage/go-coverage.out; fi

        rm -f coverage_part.out

      fi

    done

    cp coverage/go-coverage.out coverage.out

    go install github.com/boumenot/gocover-cobertura@latest

    "$(go env GOPATH)/bin/gocover-cobertura" < coverage/go-coverage.out > coverage/go-coverage.xml

    if [ -f scripts/quality/gocover_to_sonar_generic.py ]; then

      MODULE="$(go list -m)"

      python3 scripts/quality/gocover_to_sonar_generic.py --in coverage/go-coverage.out --module "$MODULE" --out coverage-sonar.xml

    fi

    '
  inputs:
  - format: xml
    name: go
    path: coverage/go-coverage.xml
    flag: go
vendors:
  sonar:
    project_key: Prekzursil_DevExtreme-Filter-Go-Language
codeql:
  # Go REQUIRES build_mode: autobuild (or manual). CodeQL v4 errors with
  # "Go does not support the none build mode" if set to ``none``.
  # See: github/codeql-action#3258 + run 24976734212 init log.
  #
  # actions + go in the SAME profile is incompatible because:
  #   - actions language only supports build-mode: none
  #   - go language only supports build-mode: autobuild|manual
  # The reusable-codeql.yml passes one global --build-mode, so the
  # languages must agree. Dropping ``actions`` keeps Go (the actual
  # codebase) analyzed; the only workflow file is the auto-generated
  # codeql.yml itself, which adds no value to scan.
  # See: run 24978222732 init log ("GitHub Actions does not support
  # the autobuild build mode").
  build_mode: autobuild
  languages:
  - go
  setup:
    go: '1.24'
dependabot:
  updates:
  - ecosystem: gomod
    directory: /
