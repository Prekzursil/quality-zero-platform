slug: Prekzursil/env-inspector
stack: python-desktop
verify_command: make verify
required_contexts_mode: replace
issue_policy:
  mode: zero
  pr_behavior: absolute
  main_behavior: absolute
coverage:
  command: |
    mkdir -p coverage
    mkdir -p .tmp
    export TMPDIR="$PWD/.tmp"
    python -m pip install --upgrade pip
    if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
    python -m pip install pytest pytest-cov
    python -m pytest -q -s \
      --cov=env_inspector \
      --cov=env_inspector_core.service \
      --cov=env_inspector_core.service_listing \
      --cov=env_inspector_core.service_models \
      --cov=env_inspector_core.service_mutations \
      --cov=env_inspector_core.service_ops \
      --cov=env_inspector_core.service_privileged \
      --cov=env_inspector_core.service_restore \
      --cov=env_inspector_core.service_paths \
      --cov=scripts.quality.assert_coverage_100 \
      --cov=scripts.quality.check_sentry_zero \
      --cov-branch \
      --cov-report=xml:coverage/python-coverage.xml
  inputs:
    - format: xml
      name: python
      path: coverage/python-coverage.xml
  require_sources:
    - env_inspector.py
    - env_inspector_core/service.py
    - env_inspector_core/service_listing.py
    - env_inspector_core/service_models.py
    - env_inspector_core/service_mutations.py
    - env_inspector_core/service_ops.py
    - env_inspector_core/service_privileged.py
    - env_inspector_core/service_restore.py
    - env_inspector_core/service_paths.py
    - scripts/quality/assert_coverage_100.py
    - scripts/quality/check_sentry_zero.py
  min_percent: 100.0
trigger:
  mode: pr-focused
  pr_head_sha: true
required_contexts:
  always:
    - shared-scanner-matrix / Coverage 100 Gate
    - shared-codecov-analytics / Codecov Analytics
    - codeql / CodeQL
    - shared-scanner-matrix / QLTY Zero
    - shared-scanner-matrix / Sonar Zero
    - shared-scanner-matrix / Codacy Zero
    - shared-scanner-matrix / Semgrep Zero
    - shared-scanner-matrix / Sentry Zero
    - shared-scanner-matrix / DeepScan Zero
  target:
    - shared-scanner-matrix / Coverage 100 Gate
    - shared-codecov-analytics / Codecov Analytics
    - codeql / CodeQL
    - shared-scanner-matrix / QLTY Zero
    - shared-scanner-matrix / Sonar Zero
    - shared-scanner-matrix / Codacy Zero
    - shared-scanner-matrix / Semgrep Zero
    - shared-scanner-matrix / Sentry Zero
    - shared-scanner-matrix / DeepScan Zero
    - SonarCloud Code Analysis
    - Codacy Static Code Analysis
    - DeepScan
    - qlty check
    - qlty coverage
    - qlty coverage diff
  pull_request_only:
    - SonarCloud Code Analysis
    - Codacy Static Code Analysis
    - DeepScan
    - qlty check
    - qlty coverage
    - qlty coverage diff
vendors:
  sonar:
    project_key: Prekzursil_env-inspector
codeql:
  languages:
    - actions
    - python
dependabot:
  updates: []
