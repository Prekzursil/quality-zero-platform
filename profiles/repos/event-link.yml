slug: Prekzursil/event-link
version: 2
stack: fullstack-web
mode:
  # Flipped shadow/ratchet -> absolute: gates BLOCK on any finding,
  # whole-tree, on push AND pull_request. Per the user's fleet-wide
  # strict-zero mandate this overrides the prior ratchet escalation plan.
  phase: absolute
scanners:
  deepsource_visible:
    severity: block
overrides: []
verify_command: bash scripts/verify
issue_policy:
  # ratchet (no-new-debt) -> zero (block on ANY issue, pre-existing
  # included). pr_behavior=absolute so PRs are held to the same whole-tree
  # bar as direct pushes to main.
  mode: zero
  pr_behavior: absolute
  main_behavior: absolute
enabled_scanners:
  deepsource_visible: true
required_contexts_mode: replace
# Whole provider context set in ``always`` so each is enforced on push AND
# pull_request. Nothing is pull_request_only.
required_contexts:
  always:
  - shared-scanner-matrix / Coverage 100 Gate
  - shared-codecov-analytics / Codecov Analytics
  - codeql / CodeQL
  - shared-scanner-matrix / QLTY Zero
  - shared-scanner-matrix / Sonar Zero
  - shared-scanner-matrix / Codacy Zero
  - shared-scanner-matrix / Semgrep Zero
  - shared-scanner-matrix / Sentry Zero
  - shared-scanner-matrix / DeepScan Zero
  - shared-scanner-matrix / DeepSource Visible Zero
  - SonarCloud Code Analysis
  - Codacy Static Code Analysis
  - DeepScan
  - qlty check
  - qlty coverage
  - qlty coverage diff
  pull_request_only: []
  target:
  - shared-scanner-matrix / Coverage 100 Gate
  - shared-codecov-analytics / Codecov Analytics
  - codeql / CodeQL
  - shared-scanner-matrix / QLTY Zero
  - shared-scanner-matrix / Sonar Zero
  - shared-scanner-matrix / Codacy Zero
  - shared-scanner-matrix / Semgrep Zero
  - shared-scanner-matrix / Sentry Zero
  - shared-scanner-matrix / DeepScan Zero
  - shared-scanner-matrix / DeepSource Visible Zero
  - SonarCloud Code Analysis
  - Codacy Static Code Analysis
  - DeepScan
  - qlty check
  - qlty coverage
  - qlty coverage diff
coverage:
  command: 'bash scripts/verify

    '
  inputs:
  - format: xml
    name: backend
    path: backend/coverage.xml
    flag: backend
  - format: xml
    name: frontend
    path: ui/coverage/cobertura-coverage.xml
    flag: frontend
  min_percent: 100.0
  branch_min_percent: 100.0
vendors:
  sonar:
    project_key: Prekzursil_event-link
codeql:
  languages:
  - actions
  - javascript-typescript
  - python
dependabot:
  updates:
  - ecosystem: pip
    directory: /backend
  - ecosystem: npm
    directory: /ui
