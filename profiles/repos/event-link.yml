slug: Prekzursil/event-link
stack: fullstack-web
verify_command: bash scripts/verify
required_contexts:
  always:
    - shared-scanner-matrix / DeepSource Visible Zero
  target:
    - shared-scanner-matrix / DeepSource Visible Zero
enabled_scanners:
  deepsource_visible: true
coverage:
  command: |
    bash scripts/verify
  inputs:
    - format: xml
      name: backend
      path: backend/coverage.xml
    - format: xml
      name: frontend
      path: ui/coverage/cobertura-coverage.xml
vendors:
  sonar:
    project_key: Prekzursil_event-link
codeql:
  languages:
    - actions
    - javascript-typescript
    - python
dependabot:
  updates:
    - ecosystem: pip
      directory: /backend
    - ecosystem: npm
      directory: /ui
