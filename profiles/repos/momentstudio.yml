slug: Prekzursil/momentstudio
stack: fullstack-web
verify_command: make verify
"required_secr\u0065ts":
  - "CHROMATIC_PROJECT_\u0054OKEN"
  - "APPLITOOLS_API_\u004bEY"
coverage:
  command: |
    python -m pip install --upgrade pip
    python -m pip install -r backend/requirements.txt coverage pytest ruff mypy
    npm --prefix frontend ci
    make coverage
  inputs:
    - format: xml
      name: backend
      path: backend/coverage.xml
    - format: lcov
      name: frontend
      path: frontend/coverage/lcov.info
required_contexts:
  always:
    - Chromatic Playwright
    - Applitools Visual
  target:
    - Chromatic Playwright
    - Applitools Visual
visual_pair_required: true
visual_lane:
  kind: web
providers:
  chromatic:
    status_context: Chromatic Playwright
    project_name: momentstudio
    "token_secr\u0065t": "CHROMATIC_PROJECT_\u0054OKEN"
    local_env_var: "CHROMATIC_PROJECT_\u0054OKEN_MOMENTSTUDIO"
  applitools:
    status_context: Applitools Visual
    project_name: momentstudio
  sonar:
    project_key: Prekzursil_AdrianaArt
