slug: Prekzursil/pbinfo-get-unsolved
stack: node-frontend
verify_command: bash scripts/verify
coverage:
  command: |
    npm ci
    npm test -- --coverage --watch=false
  inputs:
    - format: lcov
      name: node
      path: coverage/lcov.info
vendors:
  sonar:
    project_key: Prekzursil_pbinfo-get-unsolved
  sentry:
    project_vars:
      - SENTRY_PROJECT
codeql:
  languages:
    - actions
    - javascript-typescript
dependabot:
  updates:
    - ecosystem: npm
      directory: /
