slug: Prekzursil/quality-zero-platform
stack: python-web
verify_command: bash scripts/verify
required_contexts_mode: replace
required_contexts:
  always:
    - Coverage 100 Gate
    - QLTY Zero
    - Sonar Zero
    - Codacy Zero
    - Semgrep Zero
    - Sentry Zero
    - DeepScan Zero
    - SonarCloud
  pull_request_only: []
  target:
    - Coverage 100 Gate
    - Codecov Analytics
    - QLTY Zero
    - Sonar Zero
    - Codacy Zero
    - Semgrep Zero
    - Sentry Zero
    - DeepScan Zero
    - SonarCloud
coverage:
  command: |
    python -m pip install --upgrade pip
    python -m pip install -r requirements-dev.txt coverage
    coverage run -m unittest discover -s tests -p 'test_*.py'
    coverage xml -o coverage/platform-coverage.xml
  inputs:
    - format: xml
      name: platform
      path: coverage/platform-coverage.xml
  require_sources:
    - scripts/
vendors:
  sonar:
    project_key: Prekzursil_quality-zero-platform
