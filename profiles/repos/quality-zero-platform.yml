slug: Prekzursil/quality-zero-platform
version: 2
stack: python-tooling
mode:
  phase: absolute
# The platform's OWN CI self-tests against the same zero-gate scanners it
# provides to consumer repos. But the platform has 838 Codacy / 1116
# DeepSource / 110 Sonar issues accumulated before governance landed —
# fixing them all is out of scope for the QZP v2 rollout. Set
# ``issue_policy.mode: audit`` so those gates are INFORMATIONAL on the
# platform itself; consumer repos stay on ``zero`` via the stack common
# template. See docs/QZP-V2-DESIGN.md — this is a deliberate policy
# divergence for the self-hosted case, not a softening of the product.
issue_policy:
  mode: audit
scanners:
  # Every scanner is severity: block on the platform per Phase 5
  # self-governance contract. Only socket_project_report drops to info
  # because it's a probabilistic SBOM report, not an actionable finding.
  codeql: { severity: block }
  dependabot: { severity: block }
  sonarcloud: { severity: block }
  codacy_issues: { severity: block }
  codacy_complexity: { severity: block }
  codacy_clones: { severity: block }
  codacy_coverage: { severity: block }
  deepsource_visible: { severity: block }
  semgrep: { severity: block }
  sentry: { severity: block }
  socket_pr_alerts: { severity: block }
  socket_project_report: { severity: info }
  qlty_check: { severity: block }
overrides: []
verify_command: bash scripts/verify
# LEAN GATE MIGRATION (2026-06-27): the retired SaaS strict-zero contexts
# (Sonar/SonarCloud, Codacy, DeepScan, DeepSource, QLTY, Sentry, Codecov-as-gate
# and the legacy "Coverage 100 Gate" scanner-matrix lane) are NO LONGER required
# branch-protection checks on the platform's own main. The platform self-governs
# via "Control Plane Verify" (bash scripts/verify = unittest + STRICT 100%
# line+branch coverage + control-plane self-validation) and CodeQL code-scanning.
# Archive of the full SaaS control plane: branch+tag archive/qzp-full-saas-control-plane.
# The shared reusable SaaS workflows are kept (still consumed by enrolled repos
# per the lean-gate charter migration runbook) — only the SELF required contexts
# are migrated here.
required_contexts_mode: replace
required_contexts:
  always:
  - Control Plane Verify
  - codeql / CodeQL
  pull_request_only: []
  target:
  - Control Plane Verify
  - codeql / CodeQL
enabled_scanners:
  # LEAN GATE MIGRATION (2026-06-27): retire the retired-tier SaaS coverage
  # *publish* legs on the platform's OWN self-CI. These are fail-closed
  # without an operator secret and are no longer required branch-protection
  # contexts (self-governance moved to Control Plane Verify + CodeQL, which
  # still enforce the STRICT 100% line+branch coverage MEASURE via
  # ``coverage report --fail-under=100`` in scripts/verify). Disabling these
  # toggles only skips the publish STEPS in the shared scanner matrix's
  # coverage lane (the scan "Zero" lanes run unconditionally via the lane
  # dispatcher, so the rollup still receives every lane's artifact); the
  # shared reusable workflows are untouched so the enrolled fleet is
  # unaffected.
  #   - codacy: Codacy coverage upload fails "No Write permission on Project"
  #     with the account-level CODACY_API_TOKEN (a project-scoped
  #     CODACY_PROJECT_TOKEN was never provisioned).
  #   - deepsource_visible: "Publish DeepSource coverage" is fail-closed
  #     without DEEPSOURCE_DSN (never forwarded to this repo's wrapper).
  #   - sonar_coverage: the "SonarCloud scan" step in the coverage lane ran
  #     whenever SONAR_TOKEN was present and is now rejected by SonarCloud
  #     ("CI analysis while Automatic Analysis is enabled"), keeping the
  #     legacy "Coverage 100 Gate" lane red. SonarCloud is retired-tier on the
  #     lean self-CI, so retire this scan; the 100% coverage MEASURE is
  #     enforced by Control Plane Verify (scripts/verify --fail-under=100).
  codacy: false
  deepsource_visible: false
  sonar_coverage: false
coverage:
  setup:
    node: "22"
  command: "python3 -m pip install --upgrade pip\npython3 -m pip install -r requirements-dev.txt\
    \ coverage\ncoverage run --branch -m unittest discover -s tests -p 'test_*.py'\n\
    coverage xml -o coverage/platform-coverage.xml\nmkdir -p coverage\n# scripts/provider_ui/*.mjs\
    \ has its own Node test suite; emit lcov for Sonar\n# (sonar.javascript.lcov.reportPaths)\
    \ + Codecov 'provider_ui' flag so the\n# 4 .mjs files stop sitting at 0% coverage\
    \ in the dashboards. The\n# --test-coverage-exclude flag requires Node ≥22.10 (set\n\
    # via coverage.setup.node above) — it keeps test files out of the lcov\n# source list\
    \ so totals match the source-only branch coverage gate.\nnode --test --experimental-test-coverage \\\n\
    \  --test-coverage-exclude='**/*.test.mjs' \\\n  --test-reporter=lcov \\\n  --test-reporter-destination=coverage/provider_ui-lcov.info\
    \ \\\n  scripts/provider_ui/*.test.mjs || true\n"
  inputs:
  - format: xml
    name: platform
    path: coverage/platform-coverage.xml
    flag: platform
  - format: lcov
    name: provider_ui
    path: coverage/provider_ui-lcov.info
    flag: provider_ui
  require_sources:
  - scripts/
vendors:
  sonar:
    project_key: Prekzursil_quality-zero-platform
codeql:
  languages:
  - actions
  - python
dependabot:
  updates:
  - ecosystem: pip
    directory: /
