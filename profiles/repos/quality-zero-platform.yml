slug: Prekzursil/quality-zero-platform
stack: python-web
verify_command: bash scripts/verify
required_contexts_mode: replace
required_vars:
  - DEEPSCAN_POLICY_MODE
required_contexts:
  always:
    - Coverage 100 Gate
    - Sonar Zero
    - Codacy Zero
    - Semgrep Zero
    - Sentry Zero
    - DeepScan Zero
    - SonarCloud Code Analysis
    - Codacy Static Code Analysis
    - DeepScan
  target:
    - Coverage 100 Gate
    - Codecov Analytics
    - qlty check
    - qlty coverage
    - qlty coverage diff
    - Sonar Zero
    - Codacy Zero
    - Semgrep Zero
    - Sentry Zero
    - DeepScan Zero
    - SonarCloud Code Analysis
    - Codacy Static Code Analysis
    - DeepScan
coverage:
  command: |
    python -m pip install --upgrade pip
    python -m pip install -r requirements-dev.txt coverage
    coverage run -m unittest discover -s tests -p 'test_*.py'
    coverage xml -o coverage/platform-coverage.xml
  inputs:
    - format: xml
      name: platform
      path: coverage/platform-coverage.xml
vendors:
  sonar:
    project_key: Prekzursil_quality-zero-platform
