slug: Prekzursil/quality-zero-platform
version: 2
stack: python-tooling
mode:
  phase: absolute
# The platform governs itself under the SAME strict-zero contract it
# enforces on every consumer repo: whole-tree, on push AND pull_request.
# The earlier ``issue_policy.mode: audit`` divergence (grandfathering the
# pre-governance Codacy/DeepSource/Sonar backlog) is retired — the user
# requires absolute + zero everywhere, no self-hosted exception. Any
# residual provider findings must be fixed at the source, not waved
# through as informational.
issue_policy:
  mode: zero
  pr_behavior: absolute
  main_behavior: absolute
scanners:
  # Every scanner is severity: block on the platform per Phase 5
  # self-governance contract. Only socket_project_report drops to info
  # because it's a probabilistic SBOM report, not an actionable finding.
  codeql: { severity: block }
  dependabot: { severity: block }
  sonarcloud: { severity: block }
  codacy_issues: { severity: block }
  codacy_complexity: { severity: block }
  codacy_clones: { severity: block }
  codacy_coverage: { severity: block }
  deepscan: { severity: block }
  deepsource_visible: { severity: block }
  semgrep: { severity: block }
  sentry: { severity: block }
  socket_pr_alerts: { severity: block }
  socket_project_report: { severity: info }
  qlty_check: { severity: block }
overrides: []
verify_command: bash scripts/verify
required_contexts_mode: replace
# STRICT-ZERO, WHOLE-TREE, on push AND pull_request. Every wired provider
# context lives in ``always`` so it is enforced on both events — nothing
# is left pull_request_only where a direct push to main could bypass it.
required_contexts:
  always:
  - shared-scanner-matrix / Coverage 100 Gate
  - shared-codecov-analytics / Codecov Analytics
  - codeql / CodeQL
  - shared-scanner-matrix / QLTY Zero
  - shared-scanner-matrix / Sonar Zero
  - shared-scanner-matrix / Codacy Zero
  - shared-scanner-matrix / Semgrep Zero
  - shared-scanner-matrix / Sentry Zero
  - shared-scanner-matrix / DeepScan Zero
  - shared-scanner-matrix / DeepSource Visible Zero
  - SonarCloud Code Analysis
  pull_request_only: []
  target:
  - shared-scanner-matrix / Coverage 100 Gate
  - shared-codecov-analytics / Codecov Analytics
  - codeql / CodeQL
  - shared-scanner-matrix / QLTY Zero
  - shared-scanner-matrix / Sonar Zero
  - shared-scanner-matrix / Codacy Zero
  - shared-scanner-matrix / Semgrep Zero
  - shared-scanner-matrix / Sentry Zero
  - shared-scanner-matrix / DeepScan Zero
  - shared-scanner-matrix / DeepSource Visible Zero
  - SonarCloud Code Analysis
enabled_scanners:
  deepsource_visible: true
coverage:
  setup:
    node: "22"
  command: "python3 -m pip install --upgrade pip\npython3 -m pip install -r requirements-dev.txt\
    \ coverage\ncoverage run --branch -m unittest discover -s tests -p 'test_*.py'\n\
    coverage xml -o coverage/platform-coverage.xml\nmkdir -p coverage\n# scripts/provider_ui/*.mjs\
    \ has its own Node test suite; emit lcov for Sonar\n# (sonar.javascript.lcov.reportPaths)\
    \ + Codecov 'provider_ui' flag so the\n# 4 .mjs files stop sitting at 0% coverage\
    \ in the dashboards. The\n# --test-coverage-exclude flag requires Node ≥22.10 (set\n\
    # via coverage.setup.node above) — it keeps test files out of the lcov\n# source list\
    \ so totals match the source-only branch coverage gate.\nnode --test --experimental-test-coverage \\\n\
    \  --test-coverage-exclude='**/*.test.mjs' \\\n  --test-reporter=lcov \\\n  --test-reporter-destination=coverage/provider_ui-lcov.info\
    \ \\\n  scripts/provider_ui/*.test.mjs || true\n"
  inputs:
  - format: xml
    name: platform
    path: coverage/platform-coverage.xml
    flag: platform
  - format: lcov
    name: provider_ui
    path: coverage/provider_ui-lcov.info
    flag: provider_ui
  require_sources:
  - scripts/
vendors:
  sonar:
    project_key: Prekzursil_quality-zero-platform
codeql:
  languages:
  - actions
  - python
dependabot:
  updates:
  - ecosystem: pip
    directory: /
