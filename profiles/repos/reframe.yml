slug: Prekzursil/Reframe
stack: fullstack-web
verify_command: make verify
required_contexts_mode: replace
required_secrets:
  - CHROMATIC_PROJECT_TOKEN
  - APPLITOOLS_API_KEY
coverage:
  setup:
    rust: true
    system_packages:
      - libgtk-3-dev
      - libwebkit2gtk-4.1-dev
      - librsvg2-dev
      - patchelf
  command: |
    python -m venv .venv
    .venv/bin/python -m pip install --upgrade pip
    .venv/bin/pip install -r apps/api/requirements.txt -r services/worker/requirements.txt
    .venv/bin/pip install pytest pytest-cov
    npm --prefix apps/web ci
    npm --prefix apps/desktop ci
    mkdir -p coverage
    PYTHONPATH=.:apps/api:packages/media-core/src .venv/bin/python -m pytest \
      --cov=apps/api/app \
      --cov=services/worker \
      --cov=packages/media-core/src/media_core \
      --cov-report=xml:coverage/python-coverage.xml \
      apps/api/tests services/worker packages/media-core/tests
    npm --prefix apps/web run test:coverage
    npm --prefix apps/desktop run test:coverage
    cargo install cargo-llvm-cov --locked
    (cd apps/desktop/src-tauri && cargo llvm-cov --workspace --all-features --lcov --output-path ../../../coverage/desktop-rust.lcov)
  inputs:
    - format: lcov
      name: web
      path: apps/web/coverage/lcov.info
    - format: lcov
      name: desktop-ts
      path: apps/desktop/coverage/lcov.info
required_contexts:
  always:
    - Coverage 100 Gate
    - Codecov Analytics
    - Sonar Zero
    - Codacy Zero
    - Semgrep Zero
    - Sentry Zero
    - DeepScan Zero
    - SonarCloud Code Analysis
    - Python API & worker checks
    - Web build
    - Analyze (python)
    - Analyze (typescript)
  pull_request_only:
    - DeepScan
    - CodeQL
    - CodeRabbit
    - Codacy Static Code Analysis
  target:
    - Coverage 100 Gate
    - Codecov Analytics
    - qlty check
    - qlty coverage
    - qlty coverage diff
    - Sonar Zero
    - Codacy Zero
    - Semgrep Zero
    - Sentry Zero
    - DeepScan Zero
    - SonarCloud Code Analysis
    - DeepScan
    - Python API & worker checks
    - Web build
    - Analyze (python)
    - Analyze (typescript)
    - Chromatic Playwright
    - Applitools Visual
    - CodeQL
    - CodeRabbit
    - Codacy Static Code Analysis
visual_pair_required: true
visual_lane:
  kind: web
providers:
  chromatic:
    status_context: Chromatic Playwright
    project_name: Reframe
    token_secret: CHROMATIC_PROJECT_TOKEN
    local_env_var: CHROMATIC_PROJECT_TOKEN_REFRAME
  applitools:
    status_context: Applitools Visual
    project_name: Reframe
vendors:
  sonar:
    project_key: Prekzursil_Reframe
