slug: Prekzursil/TanksFlashMobile
stack: node-frontend
verify_command: make verify
"required_secr\u0065ts":
  - "CHROMATIC_PROJECT_\u0054OKEN"
  - "APPLITOOLS_API_\u004bEY"
coverage:
  command: |
    npm ci
    npm --prefix apps/web ci
    npm --prefix apps/web test -- --coverage --watch=false
  inputs:
    - format: lcov
      name: web
      path: apps/web/coverage/lcov.info
required_contexts:
  always:
    - Chromatic Playwright
    - Applitools Visual
  target:
    - Chromatic Playwright
    - Applitools Visual
visual_pair_required: true
visual_lane:
  kind: web
providers:
  chromatic:
    status_context: Chromatic Playwright
    project_name: TanksFlashMobile
    "token_secr\u0065t": "CHROMATIC_PROJECT_\u0054OKEN"
    local_env_var: "CHROMATIC_PROJECT_\u0054OKEN_TANKSFLASHMOBILE"
  applitools:
    status_context: Applitools Visual
    project_name: TanksFlashMobile
vendors:
  sonar:
    project_key: Prekzursil_TanksFlashMobile
