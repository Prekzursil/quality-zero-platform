slug: Prekzursil/WebCoder
stack: fullstack-web
verify_command: bash scripts/verify
required_secrets:
  - CHROMATIC_PROJECT_TOKEN
  - APPLITOOLS_API_KEY
coverage:
  command: |
    mkdir -p coverage
    python -m pip install --upgrade pip
    python -m pip install -r backend/requirements.txt pytest pytest-cov
    python -m pytest backend --cov=backend --cov-report=xml:backend/coverage.xml
    npm --prefix frontend/webcoder_ui ci
    npm --prefix frontend/webcoder_ui test -- --coverage --watch=false
  inputs:
    - format: xml
      name: backend
      path: backend/coverage.xml
    - format: lcov
      name: frontend
      path: frontend/webcoder_ui/coverage/lcov.info
required_contexts:
  target:
    - Chromatic Playwright
    - Applitools Visual
visual_pair_required: true
visual_lane:
  kind: web
providers:
  chromatic:
    status_context: Chromatic Playwright
    project_name: WebCoder
    token_secret: CHROMATIC_PROJECT_TOKEN
    local_env_var: CHROMATIC_PROJECT_TOKEN_WEBCODER
  applitools:
    status_context: Applitools Visual
    project_name: WebCoder
vendors:
  sonar:
    project_key: Prekzursil_WebCoder
