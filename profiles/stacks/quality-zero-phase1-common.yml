default_branch: main
verify_command: bash scripts/verify
github_mutation_lane: codex-private-runner
codex_auth_lane: chatgpt-account
provider_ui_mode: playwright-manual-login
codex_environment:
  mode: automatic
  auth_file: ~/.codex/auth.json
  network_profile: unrestricted
  methods: all
  runner_labels:
    - self-hosted
    - codex-trusted
required_secrets:
  - SONAR_TOKEN
  - CODACY_API_TOKEN
  - DEEPSCAN_API_TOKEN
  - SENTRY_AUTH_TOKEN
conditional_secrets:
  - CODECOV_TOKEN
  - CODEX_AUTH_JSON
required_vars:
  - SENTRY_ORG
  - SENTRY_PROJECT
enabled_scanners:
  coverage: true
  codecov: true
  sonar: true
  codacy: true
  semgrep: true
  sentry: true
  deepscan: true
  qlty: true
required_contexts:
  always:
    - Coverage 100 Gate
    - Codecov Analytics
    - Sonar Zero
    - Codacy Zero
    - Semgrep Zero
    - Sentry Zero
    - DeepScan Zero
    - SonarCloud Code Analysis
  pull_request_only:
    - Codacy Static Code Analysis
    - DeepScan
    - qlty check
    - qlty coverage
    - qlty coverage diff
  target:
    - Coverage 100 Gate
    - Codecov Analytics
    - qlty check
    - qlty coverage
    - qlty coverage diff
    - Sonar Zero
    - Codacy Zero
    - Semgrep Zero
    - Sentry Zero
    - DeepScan Zero
    - SonarCloud Code Analysis
    - Codacy Static Code Analysis
    - DeepScan
coverage:
  runner: ubuntu-latest
  shell: bash
  setup:
    python: "3.12"
    node: "20"
  inputs: []
  min_percent: 100.0
  assert_mode:
    default: enforce
  policy: whole-project-100
ruleset_mode: strict-zero-phase1
preserve_public_check_names: true
vendors:
  codacy:
    provider: gh
    profile_mode: defaults_all_languages
  codecov:
    status_context: Codecov Analytics
  qlty:
    gate_context: qlty check
    coverage_context: qlty coverage
    diff_coverage_context: qlty coverage diff
    check_names_actual:
      - qlty check
      - qlty coverage
      - qlty coverage diff
    diff_coverage_percent: 100
    total_coverage_policy: fail_on_any_drop
  deepscan:
    open_issues_url_var: DEEPSCAN_OPEN_ISSUES_URL
  sentry:
    org_var: SENTRY_ORG
    project_vars:
      - SENTRY_PROJECT
trigger:
  mode: standard
  pr_head_sha: false
