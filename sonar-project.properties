sonar.projectKey=Prekzursil_quality-zero-platform
sonar.organization=prekzursil
sonar.sources=scripts
sonar.tests=tests
# Provider-UI .mjs files have a Node test runner that emits .test.mjs
# companions in the same directory as the sources. Without explicit
# test.inclusions, Sonar indexes the .test.mjs files as sources and
# reports them at 0% coverage. The lcov upload (provider_ui-lcov.info)
# only carries source-file coverage, so the indexed test files end up
# dragging the line_coverage metric down.
sonar.test.inclusions=scripts/**/*.test.mjs
sonar.python.version=3.12
# CI writes coverage to coverage/platform-coverage.xml via the profile's
# coverage.command; scripts/verify writes to coverage.xml. Both paths are
# accepted so SonarCloud's new-code coverage gate reads whichever is present.
sonar.python.coverage.reportPaths=coverage/platform-coverage.xml,coverage.xml
# scripts/provider_ui/*.mjs is tested via the Node test runner, which emits
# lcov via ``node --test --experimental-test-coverage --test-reporter=lcov``.
# Without this declaration the .mjs files sit at 0% in the line-coverage
# metric (sonar.sources=scripts indexes them, but no coverage data is
# associated). The QZP self-profile coverage.command produces this file.
sonar.javascript.lcov.reportPaths=coverage/provider_ui-lcov.info
sonar.exclusions=generated/**,docs/admin/**

# `tool.coverage.run.source` in pyproject.toml restricts coverage tracing to
# rollup_v2/, fleet_inventory.py, and migrate_profiles_to_v2.py — that's the
# scope that's been hardened to 100% coverage. Every other script under
# scripts/ exists at varying coverage levels (most have unit tests but the
# coverage source restriction means they don't appear in the XML). Telling
# Sonar these files are out of coverage scope keeps the new_coverage gate
# honest: it measures only files we've committed to keeping at 100%.
#
# Phase 4 of the QZP rollout (per pyproject.toml comment) is to expand the
# coverage source to the full scripts/quality/ tree once the rollup_v2 work
# is stable. When that lands, this exclusion list shrinks accordingly.
sonar.coverage.exclusions=scripts/__init__.py,scripts/beads-fetch-conversation-history.ts,scripts/beads-fetch-pr-comments.ts,scripts/beads-self-reflect.ts,scripts/quality/__init__.py,scripts/quality/_sarif_zero_gate.py,scripts/quality/admin_dashboard_pages.py,scripts/quality/alert_dispatch.py,scripts/quality/alert_triggers.py,scripts/quality/alerts.py,scripts/quality/apply_drift_pr.py,scripts/quality/assert_coverage_100.py,scripts/quality/bootstrap_repo.py,scripts/quality/build_admin_dashboard.py,scripts/quality/build_quality_rollup.py,scripts/quality/bump_rollout.py,scripts/quality/bump_workflow_shas.py,scripts/quality/bumps.py,scripts/quality/bypass_labels.py,scripts/quality/check_applitools_zero.py,scripts/quality/check_chromatic_zero.py,scripts/quality/check_codacy_zero.py,scripts/quality/check_codeql_zero.py,scripts/quality/check_deepscan_zero.py,scripts/quality/check_deepsource_zero.py,scripts/quality/check_dependabot_alerts.py,scripts/quality/check_quality_secrets.py,scripts/quality/check_required_checks.py,scripts/quality/check_semgrep_zero.py,scripts/quality/check_sentry_zero.py,scripts/quality/check_sonar_zero.py,scripts/quality/codacy_zero_helpers.py,scripts/quality/codacy_zero_support.py,scripts/quality/common.py,scripts/quality/control_plane.py,scripts/quality/control_plane_admin.py,scripts/quality/control_plane_vendors.py,scripts/quality/coverage_findings.py,scripts/quality/coverage_parsers.py,scripts/quality/coverage_paths.py,scripts/quality/coverage_support.py,scripts/quality/coverage_types.py,scripts/quality/deepsource_html.py,scripts/quality/drift_sync.py,scripts/quality/ensure_codex_auth.py,scripts/quality/export_profile.py,scripts/quality/generate_ruleset_payload.py,scripts/quality/known_issues.py,scripts/quality/marker_regions.py,scripts/quality/normalize_coverage_for_qlty.py,scripts/quality/post_pr_quality_comment.py,scripts/quality/profile_contract_validation.py,scripts/quality/profile_coverage_normalization.py,scripts/quality/profile_normaliz