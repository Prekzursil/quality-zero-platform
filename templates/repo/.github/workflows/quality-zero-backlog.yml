name: Quality Zero Backlog

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      tool:
        description: Backlog tool lane
        required: true
        default: coverage

jobs:
  backlog-sweep:
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-backlog-sweep.yml@main
    with:
      repo_slug: ${{ github.repository }}
      tool: ${{ inputs.tool || 'coverage' }}
    secrets: inherit
