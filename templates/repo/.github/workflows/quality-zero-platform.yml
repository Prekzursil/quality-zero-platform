name: Quality Zero Platform

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  shared-scanner-matrix:
    permissions:
      contents: read
      id-token: write
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-scanner-matrix.yml@d3aabc77c858e27cb7ade824e9fbf3dd9203f256
    with:
      repo_slug: ${{ github.repository }}
      event_name: ${{ github.event_name }}
      sha: ${{ github.event.pull_request.head.sha || github.sha }}
      platform_repository: Prekzursil/quality-zero-platform
      platform_ref: main
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      DEEPSCAN_API_TOKEN: ${{ secrets.DEEPSCAN_API_TOKEN }}
